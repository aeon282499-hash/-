name: スイングシグナル配信

on:
  workflow_dispatch:           # Cloudflare Workerから起動（毎朝8:05 JST）
  schedule:
    - cron: '20 23 * * 0-4'   # バックアップ: 8:20 JST（Cloudflare失敗時の保険）

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # today_signals.json / positions.json のpushに必要
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      DISCORD_WEBHOOK_SELL_URL: ${{ secrets.DISCORD_WEBHOOK_SELL_URL }}
      DISCORD_WEBHOOK_BUY_MID_URL: ${{ secrets.DISCORD_WEBHOOK_BUY_MID_URL }}
      DISCORD_WEBHOOK_SELL_MID_URL: ${{ secrets.DISCORD_WEBHOOK_SELL_MID_URL }}
      DISCORD_WEBHOOK_BUY_SMALL_URL: ${{ secrets.DISCORD_WEBHOOK_BUY_SMALL_URL }}
      DISCORD_WEBHOOK_SELL_SMALL_URL: ${{ secrets.DISCORD_WEBHOOK_SELL_SMALL_URL }}
      DISCORD_WEBHOOK_URL_PUBLIC: ${{ secrets.DISCORD_WEBHOOK_URL_PUBLIC }}
      DISCORD_WEBHOOK_SELL_URL_PUBLIC: ${{ secrets.DISCORD_WEBHOOK_SELL_URL_PUBLIC }}
      DISCORD_WEBHOOK_CLOSE_URL_PUBLIC: ${{ secrets.DISCORD_WEBHOOK_CLOSE_URL_PUBLIC }}
      DISCORD_WEBHOOK_MONTHLY_URL_PUBLIC: ${{ secrets.DISCORD_WEBHOOK_MONTHLY_URL_PUBLIC }}
      JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
      NOTE_URL: ${{ secrets.NOTE_URL }}
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: パッケージインストール
        run: pip install -r requirements.txt

      - name: シグナル配信実行
        run: python main.py

      - name: ポジション保存（3階層分の positions / today_signals をコミット）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add \
            positions.json positions_sell.json \
            positions_mid.json positions_sell_mid.json \
            positions_small.json positions_sell_small.json \
            today_signals.json today_sell_signals.json \
            today_signals_mid.json today_sell_signals_mid.json \
            today_signals_small.json today_sell_signals_small.json || true
          git diff --cached --quiet || git commit -m "chore: update positions today_signals (3 tiers) [skip ci]"
          git pull --rebase origin main
          git push origin main
