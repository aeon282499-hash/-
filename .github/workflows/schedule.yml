name: スイングシグナル配信

on:
  workflow_dispatch:           # Cloudflare Workerから起動（毎朝8:05 JST）
  schedule:
    - cron: '20 23 * * 0-4'   # バックアップ: 8:20 JST（Cloudflare失敗時の保険）

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # today_signals.json / positions.json のpushに必要
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      DISCORD_WEBHOOK_SELL_URL: ${{ secrets.DISCORD_WEBHOOK_SELL_URL }}
      JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: パッケージインストール
        run: pip install -r requirements.txt

      - name: シグナル配信実行
        run: python main.py

      - name: ポジション保存（positions.json をコミット）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add positions.json positions_sell.json today_signals.json today_sell_signals.json || true
          git diff --cached --quiet || git commit -m "chore: update positions today_signals [skip ci]"
          git pull --rebase origin main
          git push origin main
