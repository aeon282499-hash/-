name: スイングシグナル配信

on:
  workflow_dispatch:           # Cloudflare Workerから起動（毎朝8:05 JST）
  schedule:
    - cron: '20 23 * * 0-4'   # バックアップ: 8:20 JST（Cloudflare失敗時の保険）

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # today_signals.json / positions.json のpushに必要
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      DISCORD_WEBHOOK_SELL_URL: ${{ secrets.DISCORD_WEBHOOK_SELL_URL }}
      DISCORD_WEBHOOK_BUY_MID_URL: ${{ secrets.DISCORD_WEBHOOK_BUY_MID_URL }}
      DISCORD_WEBHOOK_SELL_MID_URL: ${{ secrets.DISCORD_WEBHOOK_SELL_MID_URL }}
      DISCORD_WEBHOOK_BUY_SMALL_URL: ${{ secrets.DISCORD_WEBHOOK_BUY_SMALL_URL }}
      DISCORD_WEBHOOK_SELL_SMALL_URL: ${{ secrets.DISCORD_WEBHOOK_SELL_SMALL_URL }}
      DISCORD_WEBHOOK_URL_PUBLIC: ${{ secrets.DISCORD_WEBHOOK_URL_PUBLIC }}
      DISCORD_WEBHOOK_SELL_URL_PUBLIC: ${{ secrets.DISCORD_WEBHOOK_SELL_URL_PUBLIC }}
      DISCORD_WEBHOOK_CLOSE_URL_PUBLIC: ${{ secrets.DISCORD_WEBHOOK_CLOSE_URL_PUBLIC }}
      DISCORD_WEBHOOK_MONTHLY_URL_PUBLIC: ${{ secrets.DISCORD_WEBHOOK_MONTHLY_URL_PUBLIC }}
      DISCORD_WEBHOOK_DAY_URL: ${{ secrets.DISCORD_WEBHOOK_DAY_URL }}
      DISCORD_WEBHOOK_URL_DAY: ${{ secrets.DISCORD_WEBHOOK_URL_DAY }}
      DISCORD_WEBHOOK_URL_SECTOR_THEME: ${{ secrets.DISCORD_WEBHOOK_URL_SECTOR_THEME }}
      DISCORD_WEBHOOK_URL_THEME: ${{ secrets.DISCORD_WEBHOOK_URL_THEME }}
      JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
      NOTE_URL: ${{ secrets.NOTE_URL }}
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: パッケージインストール
        run: pip install -r requirements.txt

      - name: スイングシグナル配信実行
        run: python main.py

      - name: デイトレv2シグナル配信実行（スイング後すぐ・寄り付き9:00に余裕を持って配信）
        # main.py が失敗しても発火させる（continue-on-error: 通常時のみ実行）
        run: python main_day.py

      - name: セクターマップ月次リフレッシュ (JST月初3日)
        continue-on-error: true
        run: |
          day=$(TZ=Asia/Tokyo date +%d)
          if [ "$day" -le "03" ]; then
            echo "JST $day日: sector33_map.json を /equities/master から再取得"
            python -c "from sector_filter import fetch_sector33_map; fetch_sector33_map(force_refresh=True)"
          else
            echo "JST $day日: 月初ではないのでスキップ"
          fi

      - name: スイングセクターローテ配信実行（相乗り・Cloudflareトリガーで確実発火）
        # セクター失敗が後段のポジション保存を止めないよう continue-on-error
        continue-on-error: true
        run: python main_sector_theme.py

      - name: テーマトラッカー配信実行（相乗り・Cloudflareトリガーで確実発火）
        # 失敗が後段のポジション保存を止めないよう continue-on-error
        continue-on-error: true
        run: python main_theme.py

      - name: ダッシュボード用スナップショット生成（S/A/B/C + テーマ熱 + 米前夜）
        # 失敗が後段のポジション保存を止めないよう continue-on-error
        continue-on-error: true
        run: python build_dashboard.py

      - name: ポジション保存（スイング3階層分 + デイトレ + セクターローテ）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add \
            positions.json positions_sell.json \
            positions_mid.json positions_sell_mid.json \
            positions_small.json positions_sell_small.json \
            today_signals.json today_sell_signals.json \
            today_signals_mid.json today_sell_signals_mid.json \
            today_signals_small.json today_sell_signals_small.json \
            day_signals.json last_day_run.json \
            today_signals_sector_theme.json sector33_map.json logs/sector_theme_diag.jsonl \
            today_signals_theme.json logs/theme_diag.jsonl \
            dashboard_data.json || true
          git diff --cached --quiet || git commit -m "chore: update positions today_signals + day_signals + sector_theme + theme + dashboard [skip ci]"
          git pull --rebase origin main
          git push origin main
