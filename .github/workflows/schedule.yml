name: 毎朝シグナル配信

on:
  schedule:
    - cron: '22 23 * * 0-4'  # JST 月〜金 8:22開始 → 8:30頃配信
  workflow_dispatch:           # 手動実行ボタン

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: パッケージインストール
        run: pip install -r requirements.txt

      - name: シグナル配信実行
        run: python main.py

      - name: ポジション保存（positions.json をコミット）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add positions.json today_signals.json || true
          git diff --cached --quiet || git commit -m "chore: update positions.json today_signals.json [skip ci]"
          git push || true
