name: 朝のシグナル配信

on:
  schedule:
    - cron: '30 22 * * 0-4'   # 7:30 JST (前日22:30 UTC)
  workflow_dispatch:

jobs:
  run-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.12 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: シグナル配信スクリプトを実行
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JQUANTS_REFRESH_TOKEN: ${{ secrets.JQUANTS_REFRESH_TOKEN }}
        run: python main.py

      - name: シグナルファイルをリポジトリに保存
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add today_signals.json
          git diff --staged --quiet || git commit -m "save signals $(date +%Y-%m-%d)"
          git push
