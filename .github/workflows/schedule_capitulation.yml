name: 投げ売りブースター配信（A/Bテスト）

# 案A「投げ売り日ブースター」の検証用。本番スイング(schedule.yml)とは完全独立。
# 本番の配信ロジックには一切相乗りしない＝ここが落ちても本番朝配信は無傷。
# ※GitHub cronは遅延しうる。確実発火が要るなら後で cron-job.org / Cloudflare Worker を追加。
on:
  workflow_dispatch:
  schedule:
    - cron: '15 23 * * 0-4'   # 8:15 JST（本番8:05の後・保険）

concurrency:
  group: capitulation-morning
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DISCORD_WEBHOOK_TEST_URL: ${{ secrets.DISCORD_WEBHOOK_TEST_URL }}
      JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      CAPIT_THRESHOLD: ${{ vars.CAPIT_THRESHOLD }}   # 未設定ならコード既定21
      CAPIT_BOOST: ${{ vars.CAPIT_BOOST }}           # 未設定ならコード既定2.0
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: パッケージインストール
        run: pip install -r requirements.txt

      - name: 投げ売りブースター配信実行
        run: python capitulation.py morning

      - name: テスト用ポジション保存
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          for f in positions_test.json today_signals_test.json; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --cached --quiet || git commit -m "chore(capit): update test positions [skip ci]"
          git pull --rebase --autostash origin main
          git push origin main
