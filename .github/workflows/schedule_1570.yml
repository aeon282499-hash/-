name: 1570 ETF デイトレシグナル配信

on:
  schedule:
    - cron: '25 23 * * 1-5'  # JST 月〜金 8:25開始 → 8:30頃配信
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_1570 }}
      JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: パッケージインストール
        run: pip install -r requirements.txt

      - name: 1570シグナル配信実行
        run: python main_1570.py

      - name: signals_1570.json をコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals_1570.json || true
          git diff --cached --quiet || git commit -m "chore: update signals_1570.json [skip ci]"
          git push || true
