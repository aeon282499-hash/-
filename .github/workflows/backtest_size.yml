name: Phase2 3階層独立BT
# 各階層(大100万/中50万/小30万)が独立に「サイズで買える銘柄からスコア降順top5」を
# 選定するシミュレーション。backtest_range.py が階層別CSVを3本出力。

on:
  workflow_dispatch:
    inputs:
      start:
        description: '開始日 (YYYY-MM-DD)'
        required: true
        default: '2024-02-01'
      end:
        description: '終了日 (YYYY-MM-DD)'
        required: true
        default: '2026-05-15'

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: パッケージインストール
        run: pip install -r requirements.txt

      - name: Phase2 3階層独立BT実行
        run: python -u backtest_range.py ${{ github.event.inputs.start }} ${{ github.event.inputs.end }} --buy 2>&1 | tee bt_phase2.log

      - name: 階層別集計してDiscord送信
        run: |
          python - << 'PYEOF'
          import os, pandas as pd, requests
          start = "${{ github.event.inputs.start }}"
          end   = "${{ github.event.inputs.end }}"

          TIERS = [
              ("main",  "大100万", 1_000_000),
              ("mid",   "中 50万",   500_000),
              ("small", "小 30万",   300_000),
          ]

          def stats(df):
              n = len(df)
              if n == 0:
                  return None
              wins = df[df["pnl_pct"] > 0]
              losses = df[df["pnl_pct"] <= 0]
              pf = wins["pnl_pct"].sum() / abs(losses["pnl_pct"].sum()) if abs(losses["pnl_pct"].sum()) > 0 else float("inf")
              return {
                  "n": n,
                  "winrate": len(wins)/n*100,
                  "avg": df["pnl_pct"].mean(),
                  "total": df["pnl_pct"].sum(),
                  "pf": pf,
              }

          lines = [f"**Phase2 3階層独立BT  期間: {start} 〜 {end}**", ""]
          lines.append("## 全期間サマリ")
          lines.append("| 階層 | 1件 | 件数 | 勝率 | 平均% | PF | 累積% | 円換算 |")
          lines.append("|---|---|---|---|---|---|---|---|")
          dfs = {}
          for key, label, size in TIERS:
              path = f"backtest_{start}_{end}_{key}.csv"
              try:
                  df = pd.read_csv(path, encoding="utf-8-sig")
              except FileNotFoundError:
                  lines.append(f"| {label} | {size//10000}万 | (CSVなし) | - | - | - | - | - |")
                  continue
              dfs[key] = df
              s = stats(df)
              if s is None:
                  continue
              yen = s["total"] / 100 * size
              lines.append(
                  f"| {label} | {size//10000}万 | {s['n']} | {s['winrate']:.1f}% | "
                  f"{s['avg']:+.3f}% | **{s['pf']:.2f}** | "
                  f"{s['total']:+.0f}% | **{yen/10000:+.1f}万** |"
              )

          lines.append("")
          lines.append("## 年別")
          for key, label, size in TIERS:
              if key not in dfs:
                  continue
              df = dfs[key]
              df["year"] = df["entry_date"].str[:4]
              years = sorted(df["year"].unique())
              lines.append(f"### {label} ({size//10000}万)")
              lines.append("| 年 | 件数 | 勝率 | 平均% | PF | 累積% | 円換算 |")
              lines.append("|---|---|---|---|---|---|---|")
              for yr in years:
                  sub = df[df["year"] == yr]
                  s = stats(sub)
                  if s is None:
                      continue
                  yen = s["total"] / 100 * size
                  lines.append(
                      f"| {yr} | {s['n']} | {s['winrate']:.1f}% | "
                      f"{s['avg']:+.3f}% | **{s['pf']:.2f}** | "
                      f"{s['total']:+.0f}% | **{yen/10000:+.1f}万** |"
                  )
              lines.append("")

          lines.append("**注:** 円換算 = 累積% × 1件サイズ。実運用は5並列なので最大5倍。")
          lines.append("Phase 2 設計: 各階層が独立に「自分のサイズで買える宇宙からスコア降順top5」を選定。")

          # Discord は4000字制限。分割送信。
          desc = "\n".join(lines)
          chunks = []
          while desc:
              if len(desc) <= 3800:
                  chunks.append(desc)
                  break
              # 改行で分割
              cut = desc.rfind("\n", 0, 3800)
              if cut == -1:
                  cut = 3800
              chunks.append(desc[:cut])
              desc = desc[cut:].lstrip()

          url = os.environ.get("DISCORD_WEBHOOK_URL", "")
          for i, chunk in enumerate(chunks):
              payload = {
                  "embeds": [{
                      "title": f"📊 Phase2 階層独立BT結果 ({i+1}/{len(chunks)})" if len(chunks) > 1 else "📊 Phase2 階層独立BT結果",
                      "description": chunk,
                      "color": 0x1976D2,
                  }]
              }
              if url:
                  r = requests.post(url, json=payload, timeout=10)
                  print(f"Discord送信 chunk{i+1}: {r.status_code}")
                  if r.status_code not in (200, 204):
                      print(f"body: {r.text[:300]}")
          for ln in lines:
              print(ln)
          PYEOF
