name: モメンタムチンパン 日次ビルド＋Pages公開

# 仕組み: J-Quants V2 から日足を直接取得 → build_data.py で指標/シグナル/地合い/
#         詳細チャートJSONを生成 → kabuai/ ディレクトリ丸ごとを GitHub Pages へ公開。
# 生成物はコミットせず Pages アーティファクトとして直接デプロイ（毎日283ファイルを
# コミットするとリポジトリが肥大化するため）。
#
# ※ 公開を有効化するには、リポジトリ Settings → Pages → Build and deployment の
#    Source を「GitHub Actions」に設定する必要がある（手動・1回だけ）。

on:
  workflow_dispatch:            # 手動実行も常時可
    inputs:
      notify:
        description: 'Discord通知も送る（broad=全面リバウンド日のときだけ送信される）'
        type: boolean
        default: false
  # JPX商用条件の確認済み（2026-06-04）。平日の朝と夕方に自動更新。
  # J-Quants はその日の EOD を翌日に公開するため、朝ビルドで前営業日の終値を確実に反映し、
  # 夕方ビルドは当日 EOD が間に合えば拾う（build_data は JST 当日から取得し未公開日は自動で前日にフォールバック）。
  # ※ GitHub cron は遅延前提（保険）。確実な発火が必要なら cron-job.org→Worker→dispatch を併用。
  schedule:
    - cron: '0 22 * * 0-4'      # UTC 22:00 = JST 翌07:00 平日朝（前営業日の終値を朝までに反映）
    - cron: '30 9 * * 1-5'      # UTC 9:30  = JST 18:30  平日夕方（当日EODが間に合えば拾う）

# 同時実行を1本に制限（Pages デプロイの競合回避）
concurrency:
  group: kabuai-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
      JQUANTS_VERIFY_SSL: "true"
      KABUAI_DATA_SOURCE: jquants_api
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: パッケージインストール
        run: pip install -r kabuai/requirements.txt

      - name: データ生成（J-Quants V2 直取得）
        working-directory: kabuai
        run: python build_data.py

      - name: Pages 構成チェック
        run: |
          test -f kabuai/index.html
          test -f kabuai/web/index.html
          test -f kabuai/data/latest.json
          echo "stock JSON: $(ls kabuai/data/stocks | wc -l) 件"

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: kabuai

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  # 全面リバウンド日（rebound.mode=broad）だけ Discord 通知。散発日・通常日は何も送らない。
  # 朝ビルド（UTC22:00=JST翌07:00）のみ発火＝寄り2時間前に知らせる。夕方ビルドは同じ
  # data_date の重複になるため送らない。手動実行は notify=true を指定した時だけ。
  notify:
    needs: deploy
    if: ${{ github.event.schedule == '0 22 * * 0-4' || (github.event_name == 'workflow_dispatch' && inputs.notify) }}
    runs-on: ubuntu-latest
    env:
      KABUAI_DISCORD_WEBHOOK: ${{ secrets.KABUAI_DISCORD_WEBHOOK }}
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v6
      - name: 広がり日チェック→Discord通知（デプロイ済みの latest.json を参照）
        run: python kabuai/notify_discord.py
