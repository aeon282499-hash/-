name: 大引け前RSI判定

on:
  workflow_dispatch:           # メイン: cron-job.org → Cloudflare Worker(close-signal-trigger) から 14:55 JST にdispatch
  schedule:
    - cron: '0 5 * * 1-5'      # バックアップ: 14:00 JST想定（GitHub cronは1-2h遅延するため大引け15:00に間に合うよう前倒し）
    - cron: '45 6 * * 1-5'     # 確定チェック用: 15:45 JST想定→遅延で16-17時台着弾（送信済み+15:40以降の再実行は場中OCO約定の確定通知に転用・2026-07-23）

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # ── 投げ売りブースター(A/B検証)の大引けチェックを同じ確実経路で発火 ──
  # 本体(run)とは独立ジョブ＝ここが失敗しても本番の大引け判定は無傷。
  # capitulation.py側に同日ガードがあるため二重発火は無害。
  trigger-capit-close:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      actions: write
    steps:
      - name: 投げ売りブースター大引けチェックをdispatch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run schedule_capitulation_close.yml --repo "${{ github.repository }}" --ref main

  # ── 決算持ち越しシグナル（2026-07-10新設・独立ジョブ＝失敗しても大引け判定は無傷） ──
  # JPX予定表更新→ルールA判定→Discord買いリスト配信→positions_earnings.json記帳。
  earnings-hold:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
    env:
      DISCORD_WEBHOOK_EARNINGS_URL: ${{ secrets.DISCORD_WEBHOOK_EARNINGS_URL }}
      DISCORD_WEBHOOK_EARNINGS_MID_URL: ${{ secrets.DISCORD_WEBHOOK_EARNINGS_MID_URL }}
      DISCORD_WEBHOOK_EARNINGS_SMALL_URL: ${{ secrets.DISCORD_WEBHOOK_EARNINGS_SMALL_URL }}
      JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: パッケージインストール
        run: pip install -r requirements.txt

      - name: 決算持ち越しシグナル実行
        run: python main_earnings_hold.py

      - name: 記帳コミット（positions_earnings.json / jpx_earnings_schedule.json）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add positions_earnings.json positions_earnings_mid.json positions_earnings_small.json jpx_earnings_schedule.json earnings_times.json || true
          git diff --cached --quiet && exit 0
          git commit -m "chore: update earnings hold positions [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "push retry $i"; sleep 5
          done

  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # last_close_check.json のpushに必要
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      DISCORD_WEBHOOK_SELL_URL: ${{ secrets.DISCORD_WEBHOOK_SELL_URL }}
      DISCORD_WEBHOOK_BUY_MID_URL: ${{ secrets.DISCORD_WEBHOOK_BUY_MID_URL }}
      DISCORD_WEBHOOK_SELL_MID_URL: ${{ secrets.DISCORD_WEBHOOK_SELL_MID_URL }}
      DISCORD_WEBHOOK_BUY_SMALL_URL: ${{ secrets.DISCORD_WEBHOOK_BUY_SMALL_URL }}
      DISCORD_WEBHOOK_SELL_SMALL_URL: ${{ secrets.DISCORD_WEBHOOK_SELL_SMALL_URL }}
      DISCORD_WEBHOOK_CLOSE_URL_PUBLIC: ${{ secrets.DISCORD_WEBHOOK_CLOSE_URL_PUBLIC }}
      JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: パッケージインストール
        run: pip install -r requirements.txt

      - name: 大引け前チェック実行
        run: python close_check.py

      - name: マーカー保存（last_close_check.json をコミット）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add last_close_check.json || true
          git diff --cached --quiet || git commit -m "chore: update last_close_check [skip ci]"
          git pull --rebase origin main
          git push origin main
