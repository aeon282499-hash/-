name: 大引け前RSI判定

on:
  workflow_dispatch:           # メイン: cron-job.org → Cloudflare Worker(close-signal-trigger) から 14:55 JST にdispatch
  schedule:
    - cron: '0 5 * * 1-5'      # バックアップ: 14:00 JST想定（GitHub cronは1-2h遅延するため大引け15:00に間に合うよう前倒し）

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: パッケージインストール
        run: pip install -r requirements.txt

      - name: 大引け前チェック実行
        run: python close_check.py
