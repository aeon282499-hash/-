name: スイングセクターローテ配信

on:
  workflow_dispatch:           # 手動実行 (確認用)
  # 本番配信は schedule.yml（スイングシグナル配信）に相乗りで実行する。
  # 理由: GitHub cron は遅延/スキップが多く 8:25 JST に流れないため、
  #       Cloudflare Worker で確実発火する schedule.yml に統合した。
  # この単体ワークフローは手動確認用として残す（自動 schedule は無効）。

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DISCORD_WEBHOOK_URL_SECTOR_THEME: ${{ secrets.DISCORD_WEBHOOK_URL_SECTOR_THEME }}
      JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: パッケージインストール
        run: pip install -r requirements.txt

      - name: セクターマップ月次リフレッシュ (JST月初3日)
        run: |
          day=$(TZ=Asia/Tokyo date +%d)
          if [ "$day" -le "03" ]; then
            echo "JST $day日: sector33_map.json を /equities/master から再取得"
            python -c "from sector_filter import fetch_sector33_map; fetch_sector33_map(force_refresh=True)"
          else
            echo "JST $day日: 月初ではないのでスキップ"
          fi

      - name: スイングセクターローテ配信実行
        run: python main_sector_theme.py

      - name: 当日シグナル履歴保存
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add today_signals_sector_theme.json sector33_map.json logs/sector_theme_diag.jsonl || true
          git diff --cached --quiet || git commit -m "chore: daily update (signals/sector_map/diag_log) [skip ci]"
          git pull --rebase origin main
          git push origin main
