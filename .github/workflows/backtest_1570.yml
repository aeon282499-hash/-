name: 1570 ETF バックテスト実行

on:
  workflow_dispatch:
    inputs:
      start:
        description: '開始日 (YYYY-MM-DD)'
        required: true
        default: '2024-01-01'
      end:
        description: '終了日 (YYYY-MM-DD)'
        required: true
        default: '2025-12-31'

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_1570 }}
      JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: パッケージインストール
        run: pip install -r requirements.txt

      - name: 1570バックテスト実行
        run: python -u backtest_1570.py ${{ github.event.inputs.start }} ${{ github.event.inputs.end }} 2>&1 | tee backtest_1570_result.txt

      - name: 結果をDiscordに送信
        run: |
          python - << 'PYEOF'
          import os, re, requests

          url = os.environ.get("DISCORD_WEBHOOK_URL", "")
          if not url:
              print("DISCORD_WEBHOOK_URL未設定")
              exit()

          with open("backtest_1570_result.txt", "r", encoding="utf-8", errors="replace") as f:
              content = f.read()

          idx    = content.rfind("1570 ETF バックテスト結果")
          result = content[idx:] if idx != -1 else content[-3000:]

          def extr(pattern, text, default="—"):
              m = re.search(pattern, text)
              return m.group(1).strip() if m else default

          total   = extr(r'取引回数\s*:\s*(\d+)', result)
          wins    = extr(r'勝ち\s*:\s*(\d+)', result)
          losses  = extr(r'負け\s*:\s*(\d+)', result)
          winrate = extr(r'勝率\s*:\s*([\d.]+%)', result)
          avgpnl  = extr(r'平均損益\s*:\s*([^\n]+)', result)
          avgwin  = extr(r'平均利益\s*:\s*([^\n]+)', result)
          avgloss = extr(r'平均損失\s*:\s*([^\n]+)', result)
          pf      = extr(r'プロフィットF\s*:\s*([^\n]+)', result)
          maxdd   = extr(r'最大DD\s*:\s*([^\n]+)', result)

          if total == "0":
              fields = [{"name": "取引回数", "value": "0件（条件を満たす取引なし）", "inline": False}]
          else:
              fields = [
                  {"name": "📊 取引回数", "value": f"**{total}件**（勝{wins} / 負{losses}）", "inline": True},
                  {"name": "🎯 勝率",     "value": f"**{winrate}**",  "inline": True},
                  {"name": "💹 平均損益", "value": f"**{avgpnl}**",   "inline": True},
                  {"name": "📈 平均利益", "value": avgwin,            "inline": True},
                  {"name": "📉 平均損失", "value": avgloss,           "inline": True},
                  {"name": "⚖️ PF",       "value": f"**{pf}**",       "inline": True},
                  {"name": "📉 最大DD",   "value": f"**{maxdd}**",    "inline": True},
              ]
              exit_lines = re.findall(r'\[(?:STOP|TP|CLOSE)\s*\].*', result)
              if exit_lines:
                  fields.append({"name": "エグジット種別", "value": "\n".join(exit_lines[:5]), "inline": False})
              buy_line  = re.search(r'\[BUY\].*',  result)
              sell_line = re.search(r'\[SELL\].*', result)
              dir_text  = "\n".join(filter(None, [
                  buy_line.group()  if buy_line  else None,
                  sell_line.group() if sell_line else None,
              ]))
              if dir_text:
                  fields.append({"name": "売買方向別", "value": dir_text, "inline": False})

          payload = {
              "embeds": [{
                  "title": "🔬【バックテスト】1570 ETF ${{ github.event.inputs.start }} 〜 ${{ github.event.inputs.end }}",
                  "color": 0xE53935,
                  "fields": fields,
              }]
          }
          r = requests.post(url, json=payload, timeout=10)
          print(f"Discord送信: {r.status_code}")
          PYEOF
