name: 決算カレンダー週次更新

# 毎週金曜 21:00 JST = 12:00 UTC に earnings_calendar.json を再生成して push
# 2026-05-21 追加: 本番の決算除外フィルタ用カレンダーを最新化

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 5'  # 金曜 12:00 UTC = 21:00 JST

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: パッケージインストール
        run: pip install -r requirements.txt

      - name: 決算カレンダー生成（過去4年+1ヶ月）
        run: |
          # 開始日は固定（2022-01-01）、終了日は前日
          END_DATE=$(date -u -d 'yesterday' +%Y-%m-%d)
          python -u build_earnings_calendar.py 2022-01-01 "$END_DATE"

      - name: 未来決算予想日を追加（過去パターンから±90日推定）
        run: python -u predict_next_earnings.py

      - name: 差分があればコミット
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add earnings_calendar.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: update earnings_calendar.json [skip ci]"
            git pull --rebase
            git push
          fi
