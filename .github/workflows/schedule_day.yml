name: デイトレv2シグナル配信（停止中・schedule.yml に統合済み 2026-05-19）

# 2026-05-19: schedule.yml に統合（スイング8:13後にmain_day.pyも実行）。
# このworkflowは緊急時の手動実行用にのみ残す。
on:
  workflow_dispatch:           # 手動実行のみ
  # schedule:
  #   - cron: '34 23 * * 0-4'  # 旧 8:34 JST cron は schedule.yml に統合のため停止

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DISCORD_WEBHOOK_DAY_URL: ${{ secrets.DISCORD_WEBHOOK_DAY_URL }}
      DISCORD_WEBHOOK_URL_DAY: ${{ secrets.DISCORD_WEBHOOK_URL_DAY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: パッケージインストール
        run: pip install -r requirements.txt

      - name: デイトレv2シグナル配信実行
        run: python main_day.py

      - name: シグナル保存（day_signals.json をコミット）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add day_signals.json || true
          git diff --cached --quiet || git commit -m "chore: update day_signals [skip ci]"
          git pull --rebase origin main
          git push origin main
