<title>モメンタムチンパン — 今日の買い候補</title>
<style>
  /* v2（2026-07-02 いちから作り直し）: 画面は「✅検証済み買い候補＋出口＋先物連動タグ」だけに絞る。
     反発（反転）系シグナルは本人指示で非表示（ロジックはデータ側に残置・BUY_KEYSで制御）。 */
  :root{

    --tx:#e8edf3; --mut:#8a94a3; --acc:#4d96ff;

  }

    font-family:-apple-system,"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif;
    padding-bottom:64px;font-size:14px;line-height:1.55}
  a{color:inherit;text-decoration:none}
  header{position:sticky;top:0;z-index:10;background:rgba(14,17,22,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
  header .app{font-weight:700;font-size:16px}
  header .app small{color:var(--acc);font-weight:700}
  .datepill{font-size:11px;color:var(--mut);background:var(--card2);
    border:1px solid var(--line);border-radius:999px;padding:3px 10px}
  main{max-width:560px;margin:0 auto;padding:16px}
  h2{font-size:15px;margin:20px 2px 10px;display:flex;align-items:center;gap:8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px}
  .muted{color:var(--mut)}
  .pos{color:var(--up)}.neg{color:#ff6b6b}
  .back{font-size:13px;color:var(--acc);font-weight:600;margin-bottom:8px;display:inline-block}
  .disc{margin:18px 2px 4px;font-size:11px;color:var(--mut);line-height:1.6}
  nav{position:fixed;bottom:0;left:0;right:0;background:#11151c;

  nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;color:var(--mut);font-size:11px}
  nav a.on{color:var(--acc)}
  nav a .i{font-size:18px}
  /* ✅ 今日の買い候補（ホームの主役） */
  .hero{margin:0 0 12px;padding:13px 14px;border-radius:14px;border:1px solid var(--line);background:var(--card)}
  .hero.broad{background:linear-gradient(180deg,rgba(77,171,247,.14),rgba(77,171,247,.04));border-color:rgba(77,171,247,.5)}
  .hero .hh{font-weight:900;font-size:16px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}

  .broadline{margin-top:8px;font-size:12px;color:var(--tx);background:rgba(77,171,247,.1);

  .picklist{margin-top:10px;border-top:1px solid var(--line)}

  /* 💴 分散サイジング（資金→1銘柄あたりの目安） */

  .chip.new{border-color:rgba(255,159,67,.6);background:rgba(255,159,67,.12);color:var(--wa);font-weight:800}
  .possum{display:flex;flex-wrap:wrap;gap:6px 12px;align-items:center;font-size:12px;
    padding:8px 10px;margin-bottom:8px;border-radius:9px;background:var(--card2);border:1px solid var(--line)}
  /* 今日の日タイプ（追い風/ふつう/見送り） */
  .dayband{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;
    margin-bottom:10px;border:1px solid var(--line);background:var(--card)}
  .dayband .db-emoji{font-size:26px;line-height:1;flex:0 0 auto}
  .dayband .db-title{font-weight:900;font-size:15px}
  .dayband .db-sub{font-size:12px;color:var(--mut);line-height:1.55;margin-top:2px}
  .dayband.broad{background:linear-gradient(180deg,rgba(77,171,247,.16),rgba(77,171,247,.04));border-color:rgba(77,171,247,.55)}
  .dayband.normal{border-color:rgba(22,199,132,.4)}
  .dayband.none{background:var(--card2)}
  .dayband.none .db-title{color:var(--mut)}
  /* 検索カード */
  .rcard{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:13px 14px;margin-bottom:10px;display:block}
  .rcard .top{display:flex;align-items:flex-start;gap:10px}

  .metrics{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;font-size:12px}
  .metrics span{color:var(--mut)} .metrics b{color:var(--tx)}
  .nosig{font-size:11px;color:var(--mut);margin-top:8px}
  .planline{display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin-top:9px;padding:7px 10px;
    border-radius:9px;background:rgba(22,199,132,.08);border:1px solid rgba(22,199,132,.35);font-size:12px}
  .planline .pl-ev{font-weight:800;font-size:13px}
  .searchbox{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:12px;

  .searchbox:focus{border-color:var(--acc)}
  .searchbox::placeholder{color:var(--mut)}
  .star{flex:0 0 auto;cursor:pointer;font-size:18px;line-height:1;color:var(--mut);user-select:none;padding:0 2px}
  .star.on{color:#ffd93d}
  .tag{font-size:11px;color:var(--mut);border:1px solid var(--line);border-radius:7px;padding:2px 7px}
  .warn{color:var(--wa)}
  /* 詳細 */
  .ret3{display:flex;gap:8px;margin-top:8px}
  .ret3 .b{flex:1;background:var(--card2);border:1px solid var(--line);
    border-radius:12px;padding:9px 6px;text-align:center}
  .ret3 .b .l{font-size:11px;color:var(--mut)} .ret3 .b .v{font-size:15px;font-weight:700}
  .exitcard{border:1px solid rgba(22,199,132,.45);background:rgba(22,199,132,.07)}
  .hsearch{display:flex;align-items:center;gap:10px;color:var(--mut);font-size:14px}
  .poschip{padding:9px 0;border-bottom:1px solid var(--line)}
  .poschip:last-of-type{border-bottom:none}
  .posdel{font-size:10px;background:none;border:1px solid var(--line);color:var(--mut);
    border-radius:999px;padding:2px 8px;cursor:pointer}
  .posin{background:var(--card2);border:1px solid var(--line);color:var(--tx);
    border-radius:8px;padding:7px 9px;font-size:13px;width:130px}
  .posadd{background:var(--up);color:#0e1116;font-weight:800;border:none;border-radius:8px;
    padding:7px 16px;font-size:13px;cursor:pointer}
  .cardgrid{margin-top:8px}
  /* 🐵 モメンタム（強さ・過熱ランキング）＝買い推奨でなく"眺める"ビュー */
  .warnbar{margin:0 0 12px;font-size:12.5px;line-height:1.65;background:rgba(234,57,67,.08);
    border:1px solid rgba(234,57,67,.35);border-radius:12px;padding:11px 13px}
  .warnbar b{color:#ff6b6b}
  .gchips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .gchip{font-size:12px;font-weight:700;padding:5px 11px;border-radius:999px;background:var(--card2);
    border:1px solid var(--line);color:var(--mut);cursor:pointer}
  .gchip.on{color:var(--wa);border-color:rgba(255,159,67,.6);background:rgba(255,159,67,.12)}
  .mrow{display:flex;align-items:center;gap:10px;padding:10px 2px;border-bottom:1px solid var(--line)}
  .mrow:last-child{border-bottom:0}
  .grb{width:30px;height:30px;flex:0 0 auto;border-radius:8px;display:flex;align-items:center;
    justify-content:center;font-weight:800;font-size:14px;color:#0e1116}
  .grb.S{background:linear-gradient(135deg,#ff8a4b,#ea3943)}         /* S=熱/危険色（過熱＝買い場でない） */
  .grb.A{background:linear-gradient(135deg,#ffc04a,#ff7a45)}
  .grb.B{background:#39434f;color:#cdd6e0}
  .grb.C,.grb.D{background:var(--card2);color:var(--mut);border:1px solid var(--line)}
  .mrow .m-nm{flex:1;min-width:0}
  .mrow .m-nm b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14px}
  .mrow .m-nm small{color:var(--mut);font-size:11px}
  .mrow .m-px{text-align:right;white-space:nowrap;font-size:13px;font-weight:700;line-height:1.35}
  /* 🔥 テーマ（勢いに乗る・攻め）＝継続型のバーベルを正直に */
  .themecard{border-color:rgba(255,159,67,.45);background:linear-gradient(180deg,rgba(255,159,67,.08),transparent)}
  @media(min-width:900px){
    main{max-width:1080px}
    .cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
    .cardgrid .rcard{margin-bottom:0;height:100%}
  }
</style>

<body>
<header>
  <div class="app">🐵 モメンタム<small>チンパン</small></div>
  <a href="#/about" class="datepill" id="datepill">データ日付 —</a>
</header>
<main id="view"><div class="muted">読み込み中…</div></main>
<nav>
  <a href="#/" id="nav-home" class="on"><span class="i">✅</span>今日の買い</a>
  <a href="#/momentum" id="nav-momentum"><span class="i">🐵</span>モメンタム</a>
  <a href="#/theme" id="nav-theme"><span class="i">🔥</span>テーマ</a>
  <a href="#/explore" id="nav-explore"><span class="i">🧭</span>探検</a>
  <a href="#/about" id="nav-about"><span class="i">❓</span>使い方</a>
</nav>

<script>
const fmtPct=v=>(v==null||isNaN(v))?"—":(v>=0?"+":"")+v.toFixed(2)+"%";
const cls=v=>(v==null||isNaN(v))?"muted":(v>=0?"pos":"neg");
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
const $=s=>document.querySelector(s);
let DATA=null;

async function load(){
  const cands=["../data/latest.json","data/latest.json","./data/latest.json"];
  for(const u of cands){
    try{const r=await fetch(u,{cache:"no-store"});if(r.ok){DATA=await r.json();break;}}catch(e){}
  }
  if(!DATA) throw new Error("latest.json が見つかりません（build_data.py を実行してください）");
  computeNewCodes();
}
// ── 🆕 前回見た日から新しく点灯した買い候補（localStorage で日付比較・当日だけ光らせる） ──
let NEW_CODES=new Set();
function computeNewCodes(){
  try{
    const cur=candidates().list.map(r=>r.code);
    const prev=JSON.parse(localStorage.getItem("kabuai_seen")||"null");
    NEW_CODES=(prev&&prev.date&&prev.date!==DATA.data_date&&Array.isArray(prev.codes))
      ? new Set(cur.filter(c=>prev.codes.indexOf(c)<0)) : new Set();
    localStorage.setItem("kabuai_seen",JSON.stringify({date:DATA.data_date,codes:cur}));
  }catch(e){NEW_CODES=new Set();}
}
function isNew(code){return NEW_CODES.has(code);}
function newChip(code){return isNew(code)?`<span class="chip new">🆕新規</span>`:"";}

// ── 表示する買いシグナル（v3の核心設定） ──
// v3(2026-07-07)で反発（反転/強反転＝ダウ的な"反発初動"）を主軸に戻した。
// _edge_by_turnover.py で反発が買い集めより勝率/PFで上（強反転57.7%/PF1.77・反転53%/PF1.39
// vs 買い集め48.7%/PF1.20＝中央値マイナス）と確認済み。並びは期待値順なので強反転が自然に先頭。
const BUY_KEYS=["strong_reversal","reversal","strong_accum","accum"];
const TRK_WIN_MIN=52;   // 検証済みエッジのゲート（得意保有の勝率52%以上＆平均プラス）

function sigTrack(k){const t=DATA.signal_track;return (t&&t.available&&t.groups&&t.groups[k])||null;}
function bestHorizon(g,hs){
  let best=null;
  hs.forEach(h=>{const x=g.h&&g.h[String(h)]; if(!x||!x.n) return;
    if(best===null||x.win>best.x.win||(x.win===best.x.win&&x.avg>best.x.avg)) best={h,x};});
  return best;
}
function sigHasEdge(k){
  if(BUY_KEYS.indexOf(k)<0) return false;
  const g=sigTrack(k); if(!g||!g.n) return false;
  const b=bestHorizon(g,(DATA.signal_track.horizons)||[5,10,20]);
  return !!(b&&b.x.win>=TRK_WIN_MIN&&b.x.avg>0);
}
// 期待値(EV)＝出口ルール込み（保有8日・損切り-12%・利を伸ばす）の1件あたり実現平均リターン
function sigEV(k){
  if(!sigHasEdge(k)) return null;
  const g=sigTrack(k);
  const b=bestHorizon(g,(DATA.signal_track.horizons)||[5,10,20]);
  const ex=(g.exit&&g.exit.n)?g.exit:null;
  const m=(DATA.signals&&DATA.signals.groups&&DATA.signals.groups[k])||{};
  return {k,label:m.label||k,emoji:m.emoji||"",exit:ex,
    ev:ex?ex.avg:b.x.avg,win:ex?ex.win:b.x.win,hold:ex?ex.t:b.h,sl:ex?ex.sl:12};
}
function buyStat(r){
  const a=(r.signals||[]).map(sigEV).filter(Boolean);
  if(!a.length) return null;
  a.sort((x,y)=>y.ev-x.ev);
  return a[0];
}
// ③ なぜ買い？の一言（主シグナル＝EVトップの型を平易語に）
const WHY_BUY={
  strong_reversal:"20日で大きく下げたあとの力強い反発初動",
  reversal:"下げトレンドからの反発の初動",
  strong_accum:"大商いをともなう強い買い集め",
  accum:"出来高をともなう緩やかな買い集め"};
function whyBuy(r){const st=buyStat(r);return (st&&WHY_BUY[st.k])||"";}
// 代表出口（表示用）: BUY_KEYS のうち出口実績のある最初のもの。無ければ既定 8日/-12%
function exitRep(){
  for(const k of BUY_KEYS){const g=sigTrack(k); if(g&&g.exit&&g.exit.n) return g.exit;}
  return {t:8,sl:12};
}

// ── 先物連動度タグ（correlation.py 由来・自力=狙い目/高連動=先物依存で注意） ──
function ftagRank(r){
  const t=r&&r.futures_tag;
  if(t==="自力")return 0;
  if(t==="中連動")return 1;
  if(t==="高連動")return 3;   // 買い候補でも一段下げる（先物に振られやすい）
  return 2;                   // データ不足/未計測はその間
}
// 相関係数 r は分かりにくいので「日経連動◯%」表記にする（2026-07-02 本人指示）。
// 連動は少ないほど日経に引きずられない（日経が下げた日でも自分の需給で動ける）。
// マイナス相関＝日経が下げる日にむしろ上がりやすい傾向なので「日経と逆◯%」と明示。
function ftagPct(corr){
  if(corr==null||isNaN(corr))return null;
  const p=Math.round(Math.abs(Number(corr))*100);
  return Number(corr)<0?`日経と逆${p}%`:`日経連動${p}%`;
}
function ftagChip(r){
  const t=r&&r.futures_tag; if(!t) return "";
  const c=t==="自力"?"self":t==="高連動"?"high":"mid";
  const pct=ftagPct(r.futures_corr);
  return `<span class="ftag ${c}" title="日経平均（先物・日経レバ1570）との連動度。少ないほど日経に振られず自分の需給で動く＝日経が下げた日でも自力で動けるタイプ">${pct?pct+"・":""}${t}</span>`;
}

// ── 低位株(¥1000未満)は既定で隠す（従来設定を引き継ぎ） ──
const BUY_PRICE_MIN=1000;
function hideLowPrice(){try{return localStorage.getItem("kabuai_lowprice")!=="0";}catch(e){return true;}}
function toggleLowPrice(){try{localStorage.setItem("kabuai_lowprice",hideLowPrice()?"0":"1");}catch(e){} render();}
function priceOK(r){return !hideLowPrice()||!(r&&r.price>0&&r.price<BUY_PRICE_MIN);}

// ── 💴 分散サイジング（資金→1銘柄いくら買えばいいかの目安・localStorage・万円で入力） ──
// 「分散」はBTでも1点集中より有利（feedback: 全件分散が有利）。掛け声だけでなく金額に落とす。
const SPLIT_MAX=5;   // 分散のめやす銘柄数（資金を最大N分割）
const SECTOR_CAP=3;  // ①同一33業種は最大N件まで買い候補に出す（bt_sector_cap.pyでcap=3が最良）
function loadCapital(){try{const v=parseFloat(localStorage.getItem("kabuai_capital"));return v>0?v:0;}catch(e){return 0;}}
function setCapital(v){try{const man=parseFloat(v);
  if(man>0)localStorage.setItem("kabuai_capital",String(Math.round(man*10000)));
  else localStorage.removeItem("kabuai_capital");}catch(e){} render();}
function splitCount(n){return Math.max(1,Math.min(SPLIT_MAX,n||1));}
// 1銘柄予算 per円で買える株数と概算金額。単元未満株(S株)前提で1株から計算し、
// 100株(単元)に届くかを lots で示す。1株すら買えなければ under。
function lotFor(perYen,price){
  if(!(perYen>0)||!(price>0))return null;
  const sh=Math.floor(perYen/price);
  if(sh<1)return {under:true,need:Math.round(price)};
  return {shares:sh,cost:Math.round(sh*price),lots:sh>=100};
}
function sizeHint(r,perYen){
  const lot=lotFor(perYen,r&&r.price); if(!lot)return "";
  if(lot.under)return `<div class="pk-sz short">1株¥${lot.need.toLocaleString()}〜（予算を上げるか他の候補へ）</div>`;
  return `<div class="pk-sz">≈ ${lot.shares.toLocaleString()}株 ¥${lot.cost.toLocaleString()}${lot.lots?"":"（単元未満株）"}（1銘柄めやす）</div>`;
}

// ── 📅 全年プラスの実績（exit_years＝検証済みエッジの年別ロバストネス） ──
function sigYears(k){const g=sigTrack(k);return (g&&g.exit_years&&g.exit_years.length)?g.exit_years:null;}
// 表示中の買い候補に含まれるエッジシグナルを横断し「毎年プラスだったか」を集計。
function heroYears(list){
  const keys=[...new Set((list||[]).flatMap(r=>(r.signals||[]).filter(sigHasEdge)))];
  const arrs=keys.map(sigYears).filter(Boolean);
  if(!arrs.length)return null;
  const yset=arrs[0].map(y=>y.y);
  let allPos=0;
  yset.forEach(y=>{if(arrs.every(a=>{const f=a.find(z=>z.y===y);return f&&f.avg>0;}))allPos++;});
  return {from:yset[0],to:yset[yset.length-1],allPos,total:yset.length};
}
// 詳細ページ用: 特定シグナル(EVトップ)の年別セル
function yearLine(ks){
  const st=buyStat({signals:ks}); if(!st)return "";
  const ys=sigYears(st.k); if(!ys)return "";
  const pos=ys.filter(y=>y.avg>0).length;
  const cells=ys.map(y=>`<span class="yrcell ${y.avg>0?"pos":"neg"}"><b>${y.y}</b>${y.avg>0?"+":""}${y.avg}%<span class="muted" style="display:block;font-size:9px">勝率${y.win}%</span></span>`).join("");
  return `<div class="muted" style="margin-top:9px;font-size:11.5px">📅 年別の実績（この型・保有${st.hold}日/-${st.sl}%）— <b style="color:var(--tx)">${ys.length}年中${pos}年プラス</b>：</div>
    <div class="yrline">${cells}</div>`;
}

const HERO_CAP=8;

// ── 今日の買い候補（BUY_KEYSの点灯銘柄を dedup → 自力優先 → 期待値順） ──
function candidates(){
  const s=DATA.signals; if(!s) return {list:[],hidden:0};
  const lit=(s.order||[]).filter(k=>BUY_KEYS.indexOf(k)>=0&&s.groups[k]&&s.groups[k].count>0&&sigHasEdge(k));
  const seen={},all=[];
  lit.forEach(k=>(s.groups[k].members||[]).forEach(r=>{
    if(seen[r.code])return; seen[r.code]=1;
    all.push({...r,signals:(r.signals||[]).filter(x=>BUY_KEYS.indexOf(x)>=0&&sigHasEdge(x))});
  }));
  // v3: 板の厚い銘柄だけ推奨（売買代金 ≥ pick_min_oku=10億）。薄い銘柄は買い候補に出さない
  // （_edge_by_turnover.py: 厚い銘柄ほど勝率/PF高い＝小型偏重でない・「出来高少ない」を根治）。
  const pickMin=Number(DATA.pick_min_oku)||0;
  const thick=all.filter(r=>(r.turnover_oku!=null?r.turnover_oku:pickMin)>=pickMin);
  const sorted=thick.filter(priceOK), hidden=thick.length-sorted.length;
  // ソート優先度（2026-07-02 本人指示「買いで勝てる順」）:
  // ①期待値の高い順（出口込みの過去平均リターン＝BT検証済みの「勝てる」数字）
  // ②同率内は自力優先（先物に振られにくい・高連動は下げる）③RSI低い順
  // 注: 期待値はシグナル種類ごとの統計なので、同じシグナルの銘柄は同率＝②③で並ぶ。
  sorted.sort((a,b)=>((((buyStat(b)||{ev:-1e9}).ev)-((buyStat(a)||{ev:-1e9}).ev)))
    ||(ftagRank(a)-ftagRank(b))
    ||((a.rsi!=null?a.rsi:50)-(b.rsi!=null?b.rsi:50)));
  // ① 業種分散キャップ: 同一33業種は最大 SECTOR_CAP 件（bt_sector_cap.py: cap=3が件数ほぼ
  // 不変でPF/累積微増・弱い年を底上げ）。特に追い風の日は候補が同業種に固まるので連れ安を抑える。
  const secCount={},list=[]; let dropped=0;
  for(const r of sorted){
    const sec=r.sector||("_"+r.code);   // 業種不明は個別扱い（相互キャップしない）
    if((secCount[sec]||0)>=SECTOR_CAP){dropped++;continue;}
    secCount[sec]=(secCount[sec]||0)+1; list.push(r);
  }
  const sectors=Object.keys(secCount).filter(k=>k[0]!=="_").length;
  return {list,hidden,dropped,sectors};
}
function isCand(r){return (r.signals||[]).some(sigHasEdge);}

function pctTag(r1){if(r1==null||isNaN(r1))return "";
  const c=r1>0?"var(--up)":r1<0?"#ff6b6b":"var(--mut)",s=r1>0?"+":"";
  return `<span style="color:${c};font-weight:700">${s}${r1.toFixed(1)}%</span>`;}
function sigChips(r){
  const edge=(r.signals||[]).filter(sigHasEdge);
  if(!edge.length) return "";
  return `<div class="chips">`+newChip(r.code)+edge.map(k=>{
    const e=sigEV(k); if(!e) return "";
    return `<span class="chip buy">✅ ${e.emoji}${e.label}<span class="muted" style="font-weight:400"> 勝率${e.win}%</span></span>`;
  }).join("")+ftagChip(r)+`</div>`;
}

function planLine(r){

}

function loadPos(){try{return JSON.parse(localStorage.getItem("kabuai_pos")||"[]");}catch(e){return [];}}
function savePos(a){try{localStorage.setItem("kabuai_pos",JSON.stringify(a));}catch(e){}}
function addPosFromForm(code,name){
  const pr=parseFloat((document.getElementById("pos-price")||{}).value);
  const dt=(document.getElementById("pos-date")||{}).value;
  const shR=parseFloat((document.getElementById("pos-shares")||{}).value);
  if(!(pr>0)||!dt)return;
  const rec={code,name,entry:pr,date:dt}; if(shR>0)rec.shares=Math.round(shR);  // 株数は任意
  const a=loadPos(); a.push(rec); savePos(a); render();
}
function delPos(i){const a=loadPos(); a.splice(i,1); savePos(a); render();}
function bizDays(from,to){ // 営業日カウント(土日除外・祝日未考慮)・買った日=1日目
  let d=new Date(from+"T00:00:00"),e=new Date(to+"T00:00:00"),n=0;
  if(isNaN(d)||isNaN(e)||d>e)return 0;
  while(d<=e&&n<=60){const w=d.getDay(); if(w!==0&&w!==6)n++; d.setDate(d.getDate()+1);}
  return n;
}
function bizAdd(from,n){ // fromを1日目としてn営業日目の日付(M/D)
  let d=new Date(from+"T00:00:00"),c=0;
  if(isNaN(d))return "—";
  for(let i=0;i<60;i++){const w=d.getDay(); if(w!==0&&w!==6){c++; if(c>=n)break;} d.setDate(d.getDate()+1);}
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function posCoach(){
  const a=loadPos(); if(!a.length)return "";
  const ref=DATA.data_date||"";
  const now=new Date();
  const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
  let sum=0,cnt=0,winN=0,loseN=0,actN=0,sumYen=0,hasYen=false;
  const items=a.map((p,i)=>{
    const row=(DATA.ranking||[]).find(r=>r.code===p.code)||(SEARCH&&SEARCH.find(r=>r.code===p.code))||null;
    const cur=row?row.price:null;
    const pnl=(cur!=null&&p.entry>0)?(cur/p.entry-1)*100:null;
    if(pnl!=null){sum+=pnl;cnt++;if(pnl>0)winN++;else if(pnl<0)loseN++;}
    const yen=(pnl!=null&&p.shares>0)?Math.round((cur-p.entry)*p.shares):null;  // ②株数があれば実損益(円)
    if(yen!=null){sumYen+=yen;hasYen=true;}
    const slP=Math.round(p.entry*(1-PLAN.sl/100));
    const day=bizDays(p.date,todayStr);
    let act,actCls="";
    if(cur!=null&&cur<=slP){act=`🔴 損切りライン（¥${slP.toLocaleString()}）割れ — <b>今日売って仕切り直し</b>`;actCls="neg";actN++;}
    else if(day>=PLAN.hold){act=`⏰ ${PLAN.hold}営業日目 — <b>今日の大引けで手仕舞い</b>（保有しすぎない）`;actN++;}
    else{act=`🟢 ホールド（${day}日目／${PLAN.hold}日・手仕舞いめど ${bizAdd(p.date,PLAN.hold)}）・損切り ¥${slP.toLocaleString()}・利確なし（引っ張る）`;}
    return `<div class="poschip">
      <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
        <a href="#/detail/${p.code}" style="font-weight:800">${esc(p.name||p.code)}</a>
        <span class="muted" style="font-size:11px">${p.code}・${p.date}に¥${(+p.entry).toLocaleString()}${p.shares?`×${p.shares}株`:""}</span>
        <span style="margin-left:auto;font-weight:800" class="${pnl!=null?cls(pnl):""}">${pnl!=null?fmtPct(pnl):"—"}${yen!=null?`<span style="font-size:11px;font-weight:600">（${yen>=0?"+":"−"}¥${Math.abs(yen).toLocaleString()}）</span>`:""}</span>
        <button class="posdel" onclick="event.preventDefault();delPos(${i})">売った/削除</button></div>
      <div class="${actCls}" style="font-size:12.5px;margin-top:4px">${act}</div></div>`;
  }).join("");
  const avg=cnt?sum/cnt:null;
  const summary=`<div class="possum"><b>保有 ${a.length}件</b>
    ${avg!=null?`<span>平均損益 <b class="${cls(avg)}">${fmtPct(avg)}</b></span>`:""}
    ${hasYen?`<span>合計 <b class="${cls(sumYen)}">${sumYen>=0?"+":"−"}¥${Math.abs(sumYen).toLocaleString()}</b></span>`:""}
    ${cnt?`<span class="muted">🟢利益中${winN} / 🔴損失中${loseN}</span>`:""}
    ${actN?`<span class="warn" style="font-weight:700">⚠ 今日うごく ${actN}件</span>`:`<span class="muted">今日はホールドでOK</span>`}</div>`;
  return `<h2>📒 持ち株コーチ</h2><div class="card">${summary}${items}
    <div class="muted" style="font-size:11px;margin-top:6px">損益は <b style="color:var(--tx)">${ref} の終値</b>ベース（1日遅れ・場中は動きません）。平均損益は騰落率の単純平均。<b style="color:var(--tx)">株数を入れた銘柄は実損益（円）も表示・合計</b>します。営業日は土日のみ除外。記録はこの端末にだけ保存されます。</div></div>`;
}

function drawCandle(ch,opts){
  const cv=document.getElementById("candle");if(!cv||!ch||!ch.c||!ch.c.length)return;
  const dpr=window.devicePixelRatio||1, W=cv.clientWidth||cv.parentElement.clientWidth-28, H=240;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.height=H+"px";
  const g=cv.getContext("2d"); g.scale(dpr,dpr); g.clearRect(0,0,W,H);
  const padL=8,padR=50,padT=10,padB=22, cw=W-padL-padR, chh=H-padT-padB;
  const o=ch.o,h=ch.h,l=ch.l,c=ch.c,n=c.length;
  const stop=(opts&&opts.stop>0)?opts.stop:0;
  let pmin=Math.min(...l),pmax=Math.max(...h); if(pmin===pmax){pmin*=0.99;pmax*=1.01;}
  if(stop) pmin=Math.min(pmin,stop);   // 損切りラインが下にはみ出ないよう軸を広げる
  const pad=(pmax-pmin)*0.08; pmin-=pad; pmax+=pad;
  const xOf=i=> padL+(n<=1?cw/2:i*cw/(n-1)), band=cw/n;
  const yP=v=> padT+(pmax-v)/(pmax-pmin)*chh;
  g.font="10px sans-serif";
  g.strokeStyle="#2a313c"; g.lineWidth=1; g.fillStyle="#8a94a3";
  [pmin,(pmin+pmax)/2,pmax].forEach(v=>{const y=yP(v);
    g.beginPath();g.moveTo(padL,y);g.lineTo(W-padR,y);g.stroke();
    g.textAlign="left"; g.fillText("¥"+Math.round(v),W-padR+4,y+3);});
  const bw=Math.max(2,Math.min(9,band*0.6));
  for(let i=0;i<n;i++){const x=xOf(i),up=c[i]>=o[i];
    g.strokeStyle=up?"#16C784":"#EA3943"; g.fillStyle=up?"#16C784":"#EA3943";
    g.beginPath();g.moveTo(x,yP(h[i]));g.lineTo(x,yP(l[i]));g.stroke();
    const yo=yP(o[i]),yc=yP(c[i]); g.fillRect(x-bw/2,Math.min(yo,yc),bw,Math.max(1,Math.abs(yc-yo)));}
  // 損切りライン（赤破線）: 直近終値から -SL% の目安。出口を目で覚えるため。
  if(stop){const y=yP(stop);
    g.strokeStyle="#EA3943"; g.lineWidth=1; if(g.setLineDash)g.setLineDash([5,4]);
    g.beginPath();g.moveTo(padL,y);g.lineTo(W-padR,y);g.stroke(); if(g.setLineDash)g.setLineDash([]);
    g.fillStyle="#EA3943"; g.textAlign="left"; g.font="10px sans-serif";
    g.fillText(`損切り-${PLAN.sl}% ¥${Math.round(stop).toLocaleString()}`,padL+2,y-3);}
  g.fillStyle="#8a94a3"; g.textAlign="center"; g.font="10px sans-serif";
  [0,Math.floor(n/2),n-1].forEach(i=>{g.fillText((ch.dates[i]||"").slice(5),xOf(i),H-6);});
}

function searchResults(q){

    const found=[],missing=[];

      +`<div class="cardgrid">${found.map(searchCard).join("")}</div>${miss}${prompt}`;

      <li>単純な空売りシグナル（過熱株ショート等）は過去検証で優位性が出ず不採用です（勝率4割台・上昇年に大負け）。</li>
    </ul>
  </div>

  <h2>アプリとして使う</h2>
  <div class="card">
    <p class="muted" style="margin:0;font-size:12px;line-height:1.8">
      📱 スマホの<b style="color:var(--tx)">「ホーム画面に追加」</b>でアプリのように使えます
      （iPhone: 共有→ホーム画面に追加 ／ Android: メニュー→アプリをインストール）。</p>
  </div>

  <h2>データについて</h2>
  <div class="card">
    <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
      <span class="tag">データ日付 ${DATA.data_date||"—"}</span>
      <span class="tag">${freshnessText()}</span>
      <span class="tag">更新 平日 朝7時・8:40・夕18:30ごろ</span>
      <span class="tag">対象 ${DATA.universe_scored?DATA.universe_scored.toLocaleString():"—"}銘柄</span>
    </div>
    <p class="muted" style="margin-top:10px;font-size:12px;line-height:1.7">
      表示は<b style="color:var(--tx)">最新営業日の終値（EOD）ベース</b>です。リアルタイムではなく、<b style="color:var(--tx)">場中（9〜15時）は数字が変わりません</b>。
      原データは <b style="color:var(--tx)">J-Quants（JPX）</b> の日足を加工・計算したものです。
      日経連動タグのみ、Yahoo!ファイナンス由来の遅延5分足（yfinance）から計算した参考値です。</p>
  </div>

  <h2>免責・ライセンス</h2>
  <div class="card">
    <ul style="margin:0;padding-left:18px;font-size:12px;line-height:1.8;color:var(--mut)">
      <li>本アプリは<b style="color:var(--tx)">参考情報</b>であり、特定銘柄の売買を推奨するものではありません。<b style="color:var(--tx)">投資判断は利用者ご自身の責任</b>で行ってください。</li>
      <li>シグナル・期待値・タグはルール／AIによる<b style="color:var(--tx)">推定値で、将来の値動きや精度を保証しません</b>。</li>
      <li>生の株価（OHLCV）は<b style="color:var(--tx)">再配布していません</b>。出力は計算済みの指標と、表示用に窓を限定した加工チャートのみです。</li>
      <li>商用での一般公開にあたっては、<b style="color:var(--tx)">J-Quants の利用条件を JPX に確認</b>のうえ運用してください。</li>
    </ul>
  </div>
  <p class="disc">${DATA.disclaimer}<br>生成: ${DATA.generated_at||"—"} / source: ${DATA.source||"—"}</p>`;
}

// ── 🐵 モメンタム（強さ・過熱ランキング）＝看板ビュー。買い推奨ではない（正直フレーム） ──
// 名前どおり「今いちばん勢いがある/過熱している」順を出す。ただし bt_momentum_core.py で
// グレードSは翌10日 平均-2.65%（最も過熱で反落しやすい）と実証済みなので「買い推奨でない・
// 眺める/ウォッチ用」を明示し、Sを熱/危険色にする。買うのは✅今日の買い。
let MOM_GRADE="all";
function setMomGrade(g){MOM_GRADE=g;render();}
function viewMomentum(){
  const rk=DATA.ranking||[];
  const gc=DATA.grade_counts||{};
  const chip=(g,lbl)=>`<a class="gchip ${MOM_GRADE===g?"on":""}" onclick="event.preventDefault();setMomGrade('${g}')">${lbl}</a>`;
  const list=MOM_GRADE==="all"?rk:rk.filter(r=>r.grade===MOM_GRADE);
  const rows=list.map(r=>{
    const cand=isCand(r);
    return `<a class="mrow" href="#/detail/${r.code}">
      <div class="grb ${esc(r.grade||"D")}">${esc(r.grade||"-")}</div>
      <div class="m-nm"><b>${esc(r.name)}${cand?' <span class="chip buy" style="padding:0 6px">✅買い</span>':""}</b>
        <small>${r.code} ・ 勢い${r.momentum!=null?Math.round(r.momentum):"—"} ・ 5日 ${fmtPct(r.r5)} ・ 代金${r.turnover_oku!=null?Math.round(r.turnover_oku)+"億":"—"}</small></div>
      <div class="m-px">¥${(r.price||0).toLocaleString()}<br>${pctTag(r.r1)||"—"}</div></a>`;
  }).join("");
  return `
    <h2>🐵 モメンタム <span class="muted" style="font-weight:400;font-size:12px">強さ・過熱ランキング</span></h2>
    <div class="warnbar">🔥 <b>買い推奨ではありません。</b>「今いちばん勢いがある／過熱している」順です。
      過去データでは<b>S評価ほど翌10日は弱い（平均-2.65%＝高値づかみになりやすい）</b>。
      眺める・☆ウォッチ・勉強用に。実際に買うのは <a href="#/" style="color:var(--acc);font-weight:700">✅今日の買い</a> で。</div>
    <div class="gchips">${chip("all","すべて")}${["S","A","B","C"].filter(g=>gc[g]).map(g=>chip(g,g+" "+gc[g])).join("")}</div>
    <div class="card" style="padding:4px 14px">${rows||`<div class="muted" style="padding:12px 0">この評価の銘柄はランキング上位にありません。</div>`}</div>
    <div class="card muted" style="font-size:11px;line-height:1.7">勢いスコア＝直近の上昇効率（SR）と押し上げ力から算出。<b style="color:var(--tx)">高い＝今後上がる予測ではなく、最も過熱している目安</b>（バンド S/A/B/C/D）。上位50銘柄。✅＝この銘柄は今日の買い候補にも入っています。</div>
    <p class="disc">${DATA.disclaimer}</p>`;
}

// ── 🔥 テーマ（勢いに乗る・攻め）＝継続型モメンタム。バーベルを正直に ──
// 「上がってる勢いに乗る」欲求の正しい居場所。bt_exit（2026-06-01）で blast>=70 ×翌寄り→8日・
// 損切り-12%・利確なし = +2.36%/件・PF1.62・勝率53.7%（バーベル）。下げ相場では自然に沈黙。
function viewTheme(){
  const tb=DATA.theme_blast;
  if(!tb||!(tb.members||[]).length){
    return `<h2>🔥 テーマ（勢いに乗る）</h2>
      <div class="card muted">本日は該当するテーマ銘柄がありません。テーマ勢いは下げ相場では条件が同時成立しにくく、自然に静かになります（内蔵の下げ相場プロテクション）。</div>
      <p class="disc">${DATA.disclaimer}</p>`;
  }
  const s=tb.stats||{}, pl=tb.plan||{};
  const rows=(tb.members||[]).slice(0,20).map(m=>`<a class="pickrow" href="#/detail/${m.code}">
    <div class="pk-nm"><b>${esc(m.name)}</b><small>${m.code}${m.theme?" ・ "+esc(m.theme):""} ・ ¥${(m.price||0).toLocaleString()}${m.r20!=null?" ・ 1ヶ月 "+fmtPct(m.r20):""}</small>
      <div class="chips"><span class="chip" style="color:var(--wa);border-color:rgba(255,159,67,.5)">🔥 爆益スコア ${m.blast}</span>${m.overext?`<span class="chip" style="color:var(--dn);border-color:rgba(234,57,67,.5)">過熱</span>`:""}</div></div></a>`).join("");
  return `
    <h2>🔥 テーマ（勢いに乗る） <span class="muted" style="font-weight:400;font-size:12px">${tb.date||""} 時点</span></h2>
    <div class="card themecard">
      <div style="font-weight:800">継続型モメンタム＝“もう走っている × ホットなテーマ × 大商い”</div>
      <div style="font-size:12.5px;margin-top:6px;line-height:1.7">「上がってる勢いに乗りたい」はここで。ただし<b>バーベル型（勝率${s.win!=null?s.win:53}%）＝当たれば大きいが外れも多い</b>。
        <b style="color:#ff6b6b">損切り-${pl.sl!=null?pl.sl:12}%の厳守が前提</b>（PF${s.pf!=null?s.pf:1.62}／検証${s.period||"約1年"}）。グレードSの勢い株を単に買うのとは別物です。</div>
      <div class="exitbox" style="background:rgba(255,159,67,.07);border-color:rgba(255,159,67,.3)">🚪 <b>出口</b>: ${esc(pl.text||"翌寄り買い → 約8営業日保有・利確なし・損切り-12%")}</div>
    </div>
    <div class="card" style="padding:4px 14px"><div class="picklist" style="border-top:0">${rows}</div></div>
    <div class="card muted" style="font-size:11px;line-height:1.7">${esc(tb.note||"")}</div>
    <p class="disc">${DATA.disclaimer}</p>`;
}

// ── ルーター ──
function setNav(h){
  // 検索は#/detail同様ホーム系（ナビは点灯させない）。5タブ=今日の買い/モメンタム/テーマ/探検/使い方
  $("#nav-home").classList.toggle("on",h==="#/"||h.startsWith("#/detail")||h.startsWith("#/search"));
  $("#nav-momentum").classList.toggle("on",h.startsWith("#/momentum"));
  $("#nav-theme").classList.toggle("on",h.startsWith("#/theme"));
  $("#nav-explore").classList.toggle("on",h.startsWith("#/explore"));
  $("#nav-about").classList.toggle("on",h.startsWith("#/about"));
}
function render(){
  const h=location.hash||"#/";
  setNav(h);
  window.scrollTo(0,0);
  try{
    if(h.startsWith("#/search")) $("#view").innerHTML=viewSearch();
    else if(h.startsWith("#/detail/")) $("#view").innerHTML=viewDetail(decodeURIComponent(h.split("/")[2]));
    else if(h.startsWith("#/momentum")) $("#view").innerHTML=viewMomentum();
    else if(h.startsWith("#/theme")) $("#view").innerHTML=viewTheme();
    else if(h.startsWith("#/explore/")) $("#view").innerHTML=viewExploreList(decodeURIComponent(h.split("/")[2]));
    else if(h.startsWith("#/explore")) $("#view").innerHTML=viewExplore();
    else if(h.startsWith("#/about")) $("#view").innerHTML=viewAbout();
    else $("#view").innerHTML=viewHome();
  }catch(e){
    $("#view").innerHTML=`<div class="card"><b>表示エラー</b><div class="muted" style="font-size:12px;margin-top:6px">${esc(e.message)}</div></div>`;
  }
}
window.addEventListener("hashchange",render);
// PWA: ホーム画面に追加できるようにする（SWはキャッシュなし＝常に最新データ）
try{if(typeof navigator!=="undefined"&&navigator.serviceWorker)navigator.serviceWorker.register("sw.js");}catch(e){}
function freshnessText(){
  const lag=DATA.data_lag_days;
  if(lag==null) return "終値ベース";
  if(lag<=0) return "当日・終値";
  if(lag===1) return "前営業日・終値";
  return `${lag}日前・終値`;
}
load().then(()=>{
  $("#datepill").textContent="データ日付 "+(DATA.data_date||"—")+"（"+freshnessText()+"）";
  render();
}).catch(e=>{$("#view").innerHTML=`<div class="card">${esc(e.message)}</div>`;});
</script>
</body>
</html>
