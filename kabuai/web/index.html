<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>モメンタムチンパン — 株モメンタム分析</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0e1116; --card:#171b22; --card2:#1e242d; --line:#2a313c;
    --tx:#e8edf3; --mut:#8a94a3; --acc:#4d96ff;
    --S:#ff5d8f; --A:#ff9f43; --B:#ffd93d; --C:#6bcb77; --D:#4d96ff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);
    font-family:-apple-system,"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif;
    padding-bottom:64px;font-size:14px;line-height:1.5}
  a{color:inherit;text-decoration:none}
  header{position:sticky;top:0;z-index:10;background:rgba(14,17,22,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
  header .app{font-weight:700;font-size:16px;letter-spacing:.02em}
  header .app small{color:var(--acc);font-weight:700}
  .datepill{font-size:11px;color:var(--mut);background:var(--card2);
    border:1px solid var(--line);border-radius:999px;padding:3px 10px}
  main{max-width:560px;margin:0 auto;padding:16px}
  h2{font-size:15px;margin:22px 2px 10px;display:flex;align-items:center;gap:8px}
  h2 .more{margin-left:auto;font-size:12px;color:var(--acc);font-weight:600}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
  .muted{color:var(--mut)}
  .soon{display:inline-block;font-size:11px;color:var(--mut);
    border:1px dashed var(--line);border-radius:8px;padding:8px 10px}
  /* grade badge */
  .badge{display:inline-flex;align-items:center;justify-content:center;
    min-width:26px;height:24px;border-radius:7px;font-weight:800;font-size:13px;color:#0e1116}
  .g-S{background:var(--S)} .g-A{background:var(--A)} .g-B{background:var(--B)}
  .g-C{background:var(--C)} .g-D{background:var(--D)}
  /* rank rows */
  .row{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:0}
  .rk{width:30px;text-align:center;color:var(--mut);font-weight:700;font-size:13px}
  .nm{flex:1;min-width:0}
  .nm b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .nm small{color:var(--mut)}
  .mom{text-align:right;min-width:64px}
  .mom b{font-size:20px;font-variant-numeric:tabular-nums}
  .pos{color:#6bcb77}.neg{color:#ff6b6b}
  /* ranking detailed card */
  .rcard{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:13px 14px;margin-bottom:10px;display:block}
  .rcard .top{display:flex;align-items:flex-start;gap:10px}
  .rcard .mval{margin-left:auto;text-align:right}
  .rcard .mval b{font-size:26px;font-variant-numeric:tabular-nums;line-height:1}
  .metrics{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;font-size:12px}
  .metrics span{color:var(--mut)} .metrics b{color:var(--tx)}
  .spark{margin-top:8px;font-size:12px;color:var(--mut)}
  .spark b{color:var(--tx);font-variant-numeric:tabular-nums}
  /* detail */
  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
  .kpi{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:11px 12px}
  .kpi .l{font-size:12px;color:var(--mut)}
  .kpi .v{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
  .kpi .h{font-size:11px;color:var(--mut)}
  .ret3{display:flex;gap:10px;margin-top:6px}
  .ret3 .b{flex:1;background:var(--card2);border:1px solid var(--line);
    border-radius:12px;padding:10px;text-align:center}
  .ret3 .b .l{font-size:11px;color:var(--mut)} .ret3 .b .v{font-size:17px;font-weight:700}
  /* nav */
  nav{position:fixed;bottom:0;left:0;right:0;background:#11151c;
    border-top:1px solid var(--line);display:flex;height:56px;z-index:20}
  nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;color:var(--mut);font-size:11px}
  nav a.on{color:var(--acc)}
  nav a .i{font-size:18px}
  .disc{margin:18px 2px 4px;font-size:11px;color:var(--mut);line-height:1.6}
  .back{font-size:13px;color:var(--acc);font-weight:600;margin-bottom:8px;display:inline-block}
  .pchip{font-size:12px;color:var(--mut)}
  .tag{font-size:11px;color:var(--mut);border:1px solid var(--line);border-radius:7px;padding:2px 7px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .chip{font-size:11px;background:var(--card2);border:1px solid var(--line);
    border-radius:999px;padding:3px 9px;color:var(--tx)}
  .chip.buy{border-color:rgba(107,203,119,.5);background:rgba(107,203,119,.1);color:var(--C);font-weight:700}
  .chip.buy small{display:block;font-size:9.5px;font-weight:600;color:var(--mut);margin-top:1px;letter-spacing:.1px}
  .chip.ref{opacity:.6}
  .bar{height:6px;background:var(--card2);border-radius:999px;margin-top:8px;overflow:hidden}
  .bar.slim{height:4px;margin-top:5px}
  .barfill{height:100%;border-radius:999px}
  .segwrap{display:flex;gap:8px;margin-top:12px}
  .seg{flex:1;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:8px 10px}
  .segh{display:flex;align-items:center;justify-content:space-between;gap:6px}
  .segn{font-size:12px;font-weight:700}
  .segs{font-size:18px;font-weight:800;margin-top:2px}
  .trk{margin:10px 0}
  .trkh{font-weight:700;font-size:13px}
  .trktab{width:100%;border-collapse:collapse;margin-top:8px;font-size:12px}
  .trktab th{color:var(--mut);font-weight:600;text-align:right;padding:4px 6px;border-bottom:1px solid var(--line)}
  .trktab th:first-child{text-align:left}
  .trktab td{text-align:right;padding:5px 6px;border-bottom:1px solid var(--card2);font-variant-numeric:tabular-nums}
  .trktab td:first-child{text-align:left;color:var(--tx);font-weight:600}
  .trktab td b{font-weight:800}
  .trkn{font-size:10px;margin-top:8px;line-height:1.6}
  .bstpill{display:inline-block;font-size:11px;font-weight:700;border-radius:7px;padding:2px 8px;margin-left:6px;background:rgba(107,203,119,.15);color:var(--C);border:1px solid var(--C)}
  .bstpill small{font-weight:500;opacity:.85;margin-left:5px;font-size:10px}
  .bstpill.warn{background:rgba(255,159,67,.12);color:#ff9f43;border-color:#ff9f43}
  .trktab tr.bestrow td{background:rgba(107,203,119,.08)}
  .bsttag{font-size:9px;font-weight:800;color:var(--C);border:1px solid var(--C);border-radius:5px;padding:0 4px;margin-left:5px;vertical-align:middle}
  .exitline{margin-top:9px;padding:8px 10px;border-radius:8px;background:rgba(107,203,119,.08);border:1px solid rgba(107,203,119,.28);font-size:12px;line-height:1.55}
  .exitline b{font-weight:800;color:var(--C)}
  .exitline .exsub{display:block;margin-top:3px;font-size:11px}
  .exitline .exsub small{font-size:10px;opacity:.85;margin-left:3px}
  .exitcard{border:1px solid rgba(107,203,119,.45);background:rgba(107,203,119,.08);box-shadow:0 0 0 1px rgba(107,203,119,.12) inset}
  .exitcard .exitline{border:0;background:none;padding:0}
  .buyplan{display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin-top:9px;padding:7px 10px;
    border-radius:9px;background:rgba(107,203,119,.1);border:1px solid rgba(107,203,119,.4);font-size:12px}
  .buyplan .bp-ev{font-weight:800;font-size:13px}
  .buyplan .bp-ev small{font-weight:600;font-size:10px;color:var(--mut);margin-left:1px}
  .buyplan .bp-meta{color:var(--tx)}
  .buyplan .bp-sig{font-size:10.5px;font-weight:700;color:var(--C);border:1px solid rgba(107,203,119,.5);border-radius:999px;padding:1px 8px}
  .buyplan .bp-conf{font-size:10px;font-weight:800;color:#0e1116;background:var(--C);border-radius:999px;padding:1px 7px}
  .buylede{display:flex;flex-wrap:wrap;align-items:center;gap:6px 14px;margin:0 0 11px;padding:10px 13px;
    border-radius:11px;background:linear-gradient(180deg,rgba(107,203,119,.16),rgba(107,203,119,.07));
    border:1px solid rgba(107,203,119,.5);color:var(--tx)}
  .buylede .bl-ev{font-weight:900;font-size:18px;letter-spacing:.2px}
  .buylede .bl-ev small{font-weight:700;font-size:10px;color:var(--mut);margin-left:1px}
  .buylede .bl-cnt{font-size:12px;font-weight:700}.buylede .bl-cnt b{color:var(--C)}
  .buylede .bl-top{font-size:12px;font-weight:700;margin-left:auto}
  .buylede .bl-top b{color:var(--tx)}.buylede .bl-top small{color:var(--C);font-weight:800;margin-left:3px}
  .hero{display:block;margin-top:11px;padding:12px 14px;border-radius:12px;color:var(--tx);
    background:linear-gradient(180deg,rgba(107,203,119,.18),rgba(107,203,119,.06));
    border:1px solid rgba(107,203,119,.55);box-shadow:0 0 0 1px rgba(107,203,119,.12) inset}
  .hero .h-tag{font-size:11px;font-weight:800;color:var(--C);letter-spacing:.3px}
  .hero .h-nm{display:flex;align-items:baseline;gap:8px;margin-top:3px}
  .hero .h-nm b{font-size:16px;font-weight:800}.hero .h-nm span{font-size:11px;color:var(--mut)}
  .hero .h-ev{font-size:20px;font-weight:900;margin-top:4px}
  .hero .h-ev small{font-size:10px;font-weight:700;color:var(--mut);margin-left:2px}
  .hero .buyplan{margin-top:9px}
  .rbanner{margin:0 0 11px;padding:10px 13px;border-radius:11px;font-size:13px;line-height:1.6;color:var(--tx)}
  .rbanner.broad{background:linear-gradient(180deg,rgba(77,171,247,.16),rgba(77,171,247,.06));border:1px solid rgba(77,171,247,.5)}
  .rbanner.sparse{background:rgba(255,159,67,.09);border:1px solid rgba(255,159,67,.38)}
  .rbanner .rb-sub{font-size:11.5px;color:var(--mut);margin-top:4px}
  .rbanner .rb-sub b{color:var(--tx)}
  .rhtbl{width:100%;border-collapse:collapse;font-size:12px}
  .rhtbl th{text-align:left;color:var(--mut);font-weight:600;padding:4px 6px;border-bottom:1px solid var(--line)}
  .rhtbl td{padding:4px 6px;border-bottom:1px solid var(--line)}
  .rhtbl td.pos{color:#6bcb77;font-weight:700}.rhtbl td.neg{color:#ff6b6b;font-weight:700}
  .bcard.hot{border:1px solid rgba(194,24,91,.55);background:linear-gradient(180deg,rgba(194,24,91,.13),rgba(194,24,91,.04))}
  .bscore{font-size:15px;font-weight:900;color:#ff6b9d}.bscore.dim{color:var(--mut);font-weight:700}
  .blast-tease{display:flex;align-items:center;gap:10px;margin-top:11px;padding:10px 13px;border-radius:11px;
    border:1px solid rgba(194,24,91,.45);background:rgba(194,24,91,.08);color:var(--tx);font-size:13px}
  .blast-tease b{color:#ff6b9d}
  .idxnote{margin:2px 2px 10px;padding:8px 11px;border-radius:8px;background:rgba(255,159,67,.07);
    border:1px solid rgba(255,159,67,.26);font-size:11.5px;line-height:1.6;color:var(--tx)}
  .idxnote b{font-weight:800;color:#ff9f43}
  .idxnote a{color:var(--acc);font-weight:700}
  .sigwrap{display:flex;flex-wrap:wrap;gap:8px}
  .sigpill{font-size:12px;background:var(--card2);border:1px solid var(--line);
    border-radius:999px;padding:6px 12px;color:var(--tx)}
  .sigpill b{color:var(--acc);margin-left:4px}
  .sigsub{font-size:12px;font-weight:700;margin:0 2px 7px}
  .sigsub.buyhead{color:var(--C)}
  .sigsub .muted{font-weight:400;font-size:11px;margin-left:2px}
  .sigpill.buy{border-color:rgba(107,203,119,.45);background:rgba(107,203,119,.09)}
  .sigpill.buy b{color:var(--C)}
  .sigpill.ref{opacity:.72}
  .sigpill small{display:block;font-size:10px;color:var(--mut);margin-top:2px;font-weight:600}
  .tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .tab{flex:0 0 auto;font-size:12px;background:var(--card2);border:1px solid var(--line);
    border-radius:999px;padding:7px 12px;color:var(--mut);white-space:nowrap;display:flex;gap:5px;align-items:center;cursor:pointer}
  .tab.on{color:#0e1116;background:var(--acc);border-color:var(--acc);font-weight:700}
  .tab span{background:rgba(0,0,0,.18);border-radius:999px;padding:0 6px;font-size:11px}
  .tab.on span{background:rgba(0,0,0,.25)}
  .vtoggle{cursor:pointer;user-select:none;white-space:nowrap}
  .vtoggle:hover{border-color:var(--acc);color:var(--acc)}
  .searchbox{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:12px;
    padding:12px 14px;color:var(--tx);font-size:16px;outline:none;-webkit-appearance:none}
  .searchbox:focus{border-color:var(--acc)}
  .searchbox::placeholder{color:var(--mut)}
  .nosig{font-size:11px;color:var(--mut);margin-top:8px}
  .star{flex:0 0 auto;cursor:pointer;font-size:18px;line-height:1;color:var(--mut);user-select:none;padding:0 2px}
  .star.on{color:#ffd93d}
  .bigtag{display:inline-block;font-size:10px;font-weight:800;border-radius:6px;padding:1px 6px;margin-left:4px;vertical-align:middle}
  .bigtag.up{background:rgba(46,194,126,.16);color:#2ec27e;border:1px solid rgba(46,194,126,.5)}
  .bigtag.dn{background:rgba(255,91,91,.14);color:#ff6b6b;border:1px solid rgba(255,91,91,.5)}
  .hsearch{display:flex;align-items:center;gap:10px;color:var(--mut);font-size:14px;margin-bottom:4px}
  .hsearch:hover{border-color:var(--acc)}
  /* PC（ワイド）表示：自動でも幅900px以上、または手動PC指定で適用。ナビは両モードで維持 */
  body.pc main{max-width:1080px}
  body.pc .cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
  body.pc .cardgrid .rcard{margin-bottom:0;height:100%}
  body.pc .kpis{grid-template-columns:repeat(4,1fr)}
</style>
</head>
<body>
<header>
  <div class="app">🐵 モメンタム<small>チンパン</small></div>
  <div style="display:flex;align-items:center;gap:8px">
    <a id="viewtoggle" class="datepill vtoggle" onclick="cycleView()" title="表示モード切替（自動／PC／スマホ）">🔄 自動</a>
    <a href="#/about" class="datepill" id="datepill">データ日付 —</a>
  </div>
</header>
<main id="view"><div class="muted">読み込み中…</div></main>
<nav>
  <a href="#/" id="nav-home" class="on"><span class="i">🏠</span>ホーム</a>
  <a href="#/ranking" id="nav-rank"><span class="i">📊</span>ランキング</a>
  <a href="#/search" id="nav-search"><span class="i">🔍</span>検索</a>
  <a href="#/signals" id="nav-sig"><span class="i">🔔</span>シグナル</a>
  <a href="#/about" id="nav-about"><span class="i">❓</span>指数とは</a>
</nav>

<script>
const GRADE_LABEL={S:"S",A:"A",B:"B",C:"C",D:"D"};
const fmtPct=v=>(v==null||isNaN(v))?"—":(v>=0?"+":"")+v.toFixed(2)+"%";
const cls=v=>(v==null||isNaN(v))?"muted":(v>=0?"pos":"neg");
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
const $=s=>document.querySelector(s);
let DATA=null;

// ── ウォッチリスト＋当日大幅変動バッジ（気になる銘柄を☆保存してシグナル点灯を見張る） ──
let WATCH=readWatch();
function readWatch(){try{return JSON.parse(localStorage.getItem("kabuai_watch")||"[]")||[];}catch(e){return [];}}
function saveWatch(){try{localStorage.setItem("kabuai_watch",JSON.stringify(WATCH));}catch(e){}}
function isWatched(code){return WATCH.indexOf(code)>=0;}
function toggleWatch(code){const i=WATCH.indexOf(code);if(i>=0)WATCH.splice(i,1);else WATCH.unshift(code);saveWatch();return isWatched(code);}
function star(code){const on=isWatched(code);
  return `<span class="star${on?" on":""}" data-star="${code}" title="ウォッチに追加/解除" onclick="onStar(event,'${code}')">${on?"★":"☆"}</span>`;}
function onStar(ev,code){ev.preventDefault();ev.stopPropagation();const on=toggleWatch(code);
  if(document.querySelectorAll)document.querySelectorAll('[data-star="'+code+'"]').forEach(b=>{b.className="star"+(on?" on":"");b.textContent=on?"★":"☆";});
  if(location.hash.startsWith("#/search")&&!(SEARCH_Q||"").trim()){const el=document.getElementById("searchres");if(el)el.innerHTML=searchResults("");}}
function sigScore(r){let s=0;if((r.signals||[]).some(sigHasEdge))s+=200;else if((r.signals||[]).length)s+=100;return s-(r.rank||9999)/1e6;}
function bigMoveTag(r1){if(r1==null||isNaN(r1))return "";
  if(r1>=7)return `<span class="bigtag up">大幅高 +${r1.toFixed(1)}%</span>`;
  if(r1<=-7)return `<span class="bigtag dn">大幅安 ${r1.toFixed(1)}%</span>`;return "";}
function pctTag(r1){if(r1==null||isNaN(r1))return "";
  const c=r1>0?"#2ec27e":r1<0?"#ff6b6b":"var(--mut)",s=r1>0?"+":"";
  return `<span style="color:${c};font-weight:700">${s}${r1.toFixed(1)}%</span>`;}

async function load(){
  const cands=["../data/latest.json","data/latest.json","./data/latest.json"];
  for(const u of cands){
    try{const r=await fetch(u,{cache:"no-store"});if(r.ok){DATA=await r.json();DATA._url=u;return;}}
    catch(e){}
  }
  throw new Error("latest.json が見つかりません（build_data.py を実行してください）");
}
function badge(g){return `<span class="badge g-${g}">${GRADE_LABEL[g]||g}</span>`;}
function findStock(code){return (DATA.ranking||[]).find(r=>r.code===code)
  ||(SEARCH&&SEARCH.find(r=>r.code===code))||undefined;}
function sigMeta(key){return (DATA.signals&&DATA.signals.groups&&DATA.signals.groups[key])||null;}
// 検証済みの買いエッジ(sigHasEdge)があるシグナルは✅＋得意保有/勝率つきで前に出し、
// それ以外（過熱・中立／エッジ未確認）は控えめに後ろへ。stanceではなくBT実績で判定。
function sigChips(row){
  const ks=(row.signals||[]);if(!ks.length)return "";
  const lbl={5:"5日",10:"10日",20:"20日"};
  const edge=ks.filter(sigHasEdge), ref=ks.filter(k=>!sigHasEdge(k));
  const dim=edge.length>0;  // 買い候補がある行だけ参考シグナルを控えめにして対比を出す
  const buyChip=k=>{const m=sigMeta(k);if(!m)return "";const b=sigBest(k);
    return `<span class="chip buy">✅ ${m.emoji} ${m.label}`
      +`${b?`<small>得意${lbl[b.h]||b.h+"日"}・勝率${b.x.win}%</small>`:""}</span>`;};
  const refChip=k=>{const m=sigMeta(k);return m?`<span class="chip${dim?" ref":""}">${m.emoji} ${m.label}</span>`:"";};
  return `<div class="chips">`+edge.map(buyChip).join("")+ref.map(refChip).join("")+`</div>`;
}
function marketCard(){
  const m=DATA.market;
  if(!m||!m.available) return `<span class="soon">地合いデータなし</span>`;
  const pct=Math.max(0,Math.min(100,m.score));
  return `
    <div style="display:flex;align-items:center;gap:14px">
      <div style="text-align:center">
        <div style="font-size:32px;font-weight:800;line-height:1">${m.score.toFixed(0)}</div>
        <div>${badge(m.grade)}</div>
      </div>
      <div style="flex:1">
        <div style="font-weight:700">${m.label}</div>
        <div class="muted" style="font-size:12px">地合い <b style="color:var(--tx)">${m.regime}</b> ・ 上昇率(20日) ${m.trail20_pct>=0?"+":""}${m.trail20_pct}% ・ 騰落 ${m.breadth_pct}%が上昇</div>
        <div class="bar"><div class="barfill" style="width:${pct}%;background:var(--${m.grade})"></div></div>
      </div>
    </div>
    ${marketSegments(m)}
    <div class="muted" style="font-size:11px;margin-top:8px">${m.note}</div>`;
}
function segGauge(g){
  if(!g) return "";
  const pct=Math.max(0,Math.min(100,g.score));
  const short=g.label.split("市場")[0];

// 検証済みの買いエッジ＝過去に勝率TRK_WIN_MIN%以上＆平均プラスの得意保有がある
// （得意保有/出口の目安と同じゲート。stanceではなくBT実績で判定するので accum/reversal の
// ように stance が中立/警戒でも実績エッジがあるものは買い候補に入る）。
function sigBest(k){
  const t=DATA.signal_track; const g=t&&t.available&&t.groups&&t.groups[k];
  return g&&g.n?bestHorizon(g,t.horizons||[5,10,20]):null;
}
function sigHasEdge(k){const b=sigBest(k);return !!(b&&b.x.win>=TRK_WIN_MIN&&b.x.avg>0);}
// 期待値(EV)＝出口ルール込み（保有t日・損切り-sl%・利を伸ばす）の1トレード平均リターン。
// bt_signal_exit.py 由来の実現値。出口データが無いシグナルのみ得意保有の平均で代替。
function sigEV(k){
  const t=DATA.signal_track; const g=t&&t.available&&t.groups&&t.groups[k];
  if(!g||!g.n) return null;
  const b=bestHorizon(g,t.horizons||[5,10,20]);
  if(!(b&&b.x.win>=TRK_WIN_MIN&&b.x.avg>0)) return null;  // 検証済み買いエッジのみ
  const m=sigMeta(k)||{}, ex=(g.exit&&g.exit.n)?g.exit:null;
  return {k,label:m.label||k,emoji:m.emoji||"",h:b.h,hwin:b.x.win,havg:b.x.avg,exit:ex,ev:ex?ex.avg:b.x.avg};
}
// 銘柄の最良エッジ＝点灯中の買いシグナルのうち期待値が最大のもの＋確認本数。
function buyStat(r){
  const a=(r.signals||[]).map(sigEV).filter(Boolean);
  if(!a.length) return null;
  a.sort((x,y)=>y.ev-x.ev);
  return {best:a[0],n:a.length,ev:a[0].ev};
}

// 強反転のエッジは「その日の強反転点灯数」に依存: 10件以上の日(全面リバウンド)=勝率62.5%/

// 古いdata(phase10以前)には無いので null 安全に。

function buyPlanLine(r){

// 本日の検証済み買い候補バスケット（全買いシグナル横断で銘柄をdedup・期待値順）。
function buyBasket(){
  const s=DATA.signals; if(!s) return null;
  const lit=s.order.filter(k=>s.groups[k].count>0&&sigHasEdge(k));
  if(!lit.length) return null;
  const seen={},members=[];
  lit.forEach(k=>(s.groups[k].members||[]).forEach(r=>{
    let o=seen[r.code]; if(!o){o=seen[r.code]={...r,signals:[]};members.push(o);}
    if(o.signals.indexOf(k)<0)o.signals.push(k);}));
  members.sort((a,b)=>{const ea=buyStat(a),eb=buyStat(b);
    return ((eb?eb.ev:-1e9)-(ea?ea.ev:-1e9))||((a.rsi!=null?a.rsi:50)-(b.rsi!=null?b.rsi:50))||(a.momentum-b.momentum);});
  const evs=members.map(r=>(buyStat(r)||{ev:0}).ev);
  const avg=evs.length?Math.round(evs.reduce((a,b)=>a+b,0)/evs.length*100)/100:0;
  return {members,count:members.length,avgEV:avg,top:members[0]};
}
function signalSummary(){
  const s=DATA.signals;if(!s)return `<span class="soon">シグナルなし</span>`;
  const lit=s.order.filter(k=>s.groups[k].count>0);
  if(!lit.length)return `<span class="soon">本日の点灯シグナルなし</span>`;
  const total=lit.reduce((a,k)=>a+s.groups[k].count,0);
  const lbl={5:"5日",10:"10日",20:"20日"};
  const buy=lit.filter(sigHasEdge).sort((a,b)=>((sigEV(b)||{ev:-1e9}).ev-(sigEV(a)||{ev:-1e9}).ev)), ref=lit.filter(k=>!sigHasEdge(k));
  const buyPill=k=>{const g=s.groups[k],e=sigEV(k);

  const refPill=k=>{const g=s.groups[k];
    return `<a class="sigpill ref" href="#/signals/${k}">${g.emoji} ${g.label} <b>${g.count}</b></a>`;};
  const bb=buyBasket();

  const buyBlk=buy.length

    : "";

}

const MOMCOL=m=>m>=80?"#ff5d8f":m>=60?"#ff9f43":m>=40?"#ffd93d":m>=20?"#6bcb77":"#4d96ff";
function drawCandle(ch){
  const cv=document.getElementById("candle");if(!cv||!ch||!ch.c||!ch.c.length)return;
  const dpr=window.devicePixelRatio||1, W=cv.clientWidth||cv.parentElement.clientWidth-28, H=260;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.height=H+"px";
  const g=cv.getContext("2d"); g.scale(dpr,dpr); g.clearRect(0,0,W,H);
  const padL=38,padR=50,padT=10,padB=22, cw=W-padL-padR, chh=H-padT-padB;
  const o=ch.o,h=ch.h,l=ch.l,c=ch.c,mom=ch.momentum,n=c.length;
  let pmin=Math.min(...l),pmax=Math.max(...h); if(pmin===pmax){pmin*=0.99;pmax*=1.01;}
  const pad=(pmax-pmin)*0.08; pmin-=pad; pmax+=pad;
  const xOf=i=> padL+(n<=1?cw/2:i*cw/(n-1)), band=cw/n;
  const yP=v=> padT+(pmax-v)/(pmax-pmin)*chh, yM=v=> padT+(100-v)/100*chh;
  g.font="10px sans-serif";
  g.strokeStyle="#2a313c"; g.lineWidth=1; g.fillStyle="#8a94a3";
  [0,50,100].forEach(v=>{const y=yM(v); g.beginPath();g.moveTo(padL,y);g.lineTo(W-padR,y);g.stroke();
    g.textAlign="right"; g.fillText(v,padL-4,y+3);});
  [pmin,(pmin+pmax)/2,pmax].forEach(v=>{g.textAlign="left"; g.fillText("¥"+Math.round(v),W-padR+4,yP(v)+3);});
  const bw=Math.max(2,Math.min(9,band*0.6));
  for(let i=0;i<n;i++){const x=xOf(i),up=c[i]>=o[i];
    g.strokeStyle=up?"#2ec27e":"#ff5b5b"; g.fillStyle=up?"#2ec27e":"#ff5b5b";
    g.beginPath();g.moveTo(x,yP(h[i]));g.lineTo(x,yP(l[i]));g.stroke();
    const yo=yP(o[i]),yc=yP(c[i]); g.fillRect(x-bw/2,Math.min(yo,yc),bw,Math.max(1,Math.abs(yc-yo)));}
  g.lineWidth=2;
  for(let i=1;i<n;i++){if(mom[i]==null||mom[i-1]==null)continue;
    g.strokeStyle=MOMCOL(mom[i]); g.beginPath();g.moveTo(xOf(i-1),yM(mom[i-1]));g.lineTo(xOf(i),yM(mom[i]));g.stroke();}
  g.fillStyle="#8a94a3"; g.textAlign="center";
  [0,Math.floor(n/2),n-1].forEach(i=>{g.fillText((ch.dates[i]||"").slice(5),xOf(i),H-6);});
}

// 得意保有＝過去に最も勝率が高かった保有日数。勝率は保有期間に対して単調でないため
// 平均リターン(長いほど大→常に最長になる)よりシグナル固有の構造を素直に映す。
const TRK_WIN_MIN=52;  // この勝率＆平均プラスを満たす保有期間が無ければ「得意なし」と正直表示
function bestHorizon(g,hs){
  let best=null;
  hs.forEach(h=>{const x=g.h&&g.h[String(h)]; if(!x||!x.n) return;
    if(best===null||x.win>best.x.win||(x.win===best.x.win&&x.avg>best.x.avg)) best={h,x};});
  return best;
}
function trackPanel(key){
  const t=DATA.signal_track; if(!t||!t.available) return "";
  const g=t.groups&&t.groups[key]; if(!g||!g.n) return "";
  const hs=t.horizons||[5,10,20];
  const lbl={5:"5日",10:"10日",20:"20日"};
  const best=bestHorizon(g,hs);
  const ok=!!(best&&best.x.win>=TRK_WIN_MIN&&best.x.avg>0);
  const rows=hs.map(h=>{const x=g.h&&g.h[String(h)]; if(!x) return "";
    const wc=x.win>=50?"pos":"neg", ac=x.avg>=0?"pos":"neg", mc=x.med>=0?"pos":"neg";
    const isBest=ok&&best.h===h;
    return `<tr class="${isBest?"bestrow":""}"><td>${lbl[h]||(h+"日")}後${isBest?'<span class="bsttag">得意</span>':''}</td>
      <td><b class="${wc}">${x.win}%</b></td>
      <td class="${ac}">${x.avg>=0?"+":""}${x.avg}%</td>
      <td class="${mc}">${x.med>=0?"+":""}${x.med}%</td>
      <td class="muted">${(x.n||0).toLocaleString()}</td></tr>`;}).join("");
  if(!rows) return "";
  const tag=ok
    ? `<span class="bstpill">得意保有 ${lbl[best.h]||(best.h+"日")}<small>勝率${best.x.win}%・平均+${best.x.avg}%</small></span>`
    : `<span class="bstpill warn">明確な得意保有なし<small>どの期間も勝率5割級</small></span>`;
  const p=t.period||{};
  const span=t.window?`${t.window}`:`検証期間 ${p.from||"—"}〜${p.to||"—"}`;
  // 出口の目安: エッジのある買い系(ok)のみ表示。固定ポリシーの実現リターン(bt_signal_exit.py由来)。
  const ex=g.exit;
  const exline=(ok&&ex&&ex.n)?`<div class="exitline">🚪 出口の目安 <b>保有${ex.t}日めど</b>・<b>損切り-${ex.sl}%</b>・利確なし（利を伸ばす）

  return `<div class="card trk">
    <div class="trkh">📊 ヒストリカル実績 <span class="muted" style="font-weight:400">（${g.label}・発動日終値を基準）</span>${tag}</div>
    <table class="trktab">
      <thead><tr><th>保有</th><th>勝率</th><th>平均</th><th>中央値</th><th>標本</th></tr></thead>
      <tbody>${rows}</tbody></table>
    ${exline}
    <div class="muted trkn">「得意保有」＝過去に最も勝率が高かった保有日数（勝率${TRK_WIN_MIN}%以上＆平均プラスの時のみ表示）。${span}（${(g.n||0).toLocaleString()}回発動）。${t.note}</div>
  </div>`;

  const buyKeys=lit.filter(k=>sigHasEdge(k));

  buyKeys.forEach(k=>{(s.groups[k].members||[]).forEach(r=>{
    let o=seen[r.code]; if(!o){o=seen[r.code]={...r,signals:[]};buyMembers.push(o);}
    if(o.signals.indexOf(k)<0)o.signals.push(k);

function searchResults(q){
  if(!SEARCH)return `<div class="card muted">索引を読み込み中…</div>`;
  q=(q||"").trim();
  if(!q){
    const prompt=`<div class="card muted" style="margin-top:10px">コード（例 7203）か銘柄名の一部を入力すると、`
      +`監視中の <b style="color:var(--tx)">${SEARCH.length.toLocaleString()}</b> 銘柄から、`
      +`その銘柄に<b style="color:var(--tx)">シグナルが点灯しているか</b>を確認できます。</div>`;
    const found=[],missing=[];
    WATCH.forEach(c=>{const r=SEARCH.find(s=>s.code===c);r?found.push(r):missing.push(c);});
    if(!found.length&&!missing.length)
      return `<div class="card muted">⭐ カードの☆を押すと気になる銘柄をここに保存でき、`
        +`点灯シグナルを毎回まとめて確認できます。</div>`+prompt;
    found.sort((a,b)=>sigScore(b)-sigScore(a));
    const miss=missing.length?`<div class="muted" style="font-size:11px;margin:8px 2px">`
      +`${missing.map(esc).join("・")} は本日は対象外（流動性フィルタ）</div>`:"";
    return `<div class="sigsub buyhead">⭐ ウォッチ中（${found.length+missing.length}件）</div>`
      +`<div class="cardgrid">${found.map(r=>searchCard(r)).join("")}</div>${miss}${prompt}`;
  }
  const ql=q.toLowerCase();
  let hits=SEARCH.filter(r=>r.code.startsWith(q)||r.name.toLowerCase().includes(ql));
  const score=r=>(r.code===q?1000:r.code.startsWith(q)?500:0)+sigScore(r);
  hits.sort((a,b)=>score(b)-score(a));
  const shown=hits.slice(0,60);
  if(!shown.length)return `<div class="card muted">「${esc(q)}」に一致する銘柄はありません。`
    +`<br><span style="font-size:11px">※流動性フィルタ（売買代金の少ない銘柄）対象外は検索できません。</span></div>`;
  const more=hits.length>shown.length?`<div class="muted" style="font-size:11px;margin:2px 2px 8px">上位${shown.length}件を表示（${hits.length}件一致・絞り込んでください）</div>`:
    `<div class="muted" style="font-size:11px;margin:2px 2px 8px">${shown.length}件一致</div>`;
  return more+`<div class="cardgrid">${shown.map(r=>searchCard(r)).join("")}</div>`;
}

// SL-12%」=+2.36%/件・PF1.62(n=1,481)。勝率53%のバーベル型=損切り厳守が前提。
function viewBlast(){
  const tb=DATA.theme_blast;

  const st=tb.stats||{}, pl=tb.plan||{};
  const hot=tb.members.filter(m=>m.blast>=tb.threshold);
  const ref=tb.members.filter(m=>m.blast<tb.threshold);
  const card=(m,main)=>`<div class="card bcard${main?" hot":""}">
      <div style="display:flex;align-items:baseline;gap:8px">
        <b style="font-size:15px">${m.name}</b><span class="muted" style="font-size:11px">${m.code}・¥${(m.price||0).toLocaleString()}</span>

      <div class="ret3" style="margin-top:6px">
        <div class="b"><div class="l">25MA乖離</div><div class="v ${cls(m.dev)}">${fmtPct(m.dev)}</div></div>
        <div class="b"><div class="l">1ヶ月</div><div class="v ${cls(m.r20)}">${fmtPct(m.r20)}</div></div>
        <div class="b"><div class="l">テーマ熱</div><div class="v">${m.heat!=null?m.heat:"—"}</div></div>
      </div></div>`;
  return `${head}
  <div class="card" style="margin:10px 0">
    <div style="font-weight:700">📋 検証済みプラン <span class="muted" style="font-weight:400">（テーマデータ: ${tb.date||"—"} 終値）</span></div>
    <div style="font-size:13.5px;line-height:1.7;margin-top:5px"><b>${pl.text||"翌寄り買い → 約8営業日保有・利確なし・損切り-12%"}</b></div>
    <div class="muted" style="font-size:12px;margin-top:5px">過去検証: <b style="color:var(--tx)">平均+${st.avg}%/件・PF${st.pf}</b>（勝率${st.win}%・損切り発動${st.stop_rate}%・${(st.n||0).toLocaleString()}回・${st.period}）</div>
    <div class="muted" style="font-size:11.5px;line-height:1.75;margin-top:7px">

      ・<b style="color:#ff9f43">勝率53%のバーベル型</b>＝裾の大化けで稼ぐ設計。外れも多いので<b>損切り-12%の厳守が前提</b><br>
      ・検証期間は${st.period}（約1.1年）と浅め。買い候補シグナル（4.4年検証）より証拠は弱いことを正直に明記<br>
      ・あくまで過去の傾向で、上がることを保証するものではありません</div>
  </div>
  ${hot.length?`<div class="sigsub buyhead">🔥 本命（blast ${tb.threshold}以上・本日 ${hot.length}件）</div><div class="cardgrid">${hot.map(m=>card(m,true)).join("")}</div>`
    :`<div class="card muted">本日 blast ${tb.threshold}以上の本命はありません（参考リストのみ）。</div>`}
  ${ref.length?`<div class="sigsub muted" style="margin-top:12px">参考（blast 50〜${tb.threshold-1}・監視リスト）</div><div class="cardgrid">${ref.map(m=>card(m,false)).join("")}</div>`:""}
  <p class="disc">${tb.note||""}<br>${DATA.disclaimer}</p>`;
}

  $("#nav-about").classList.toggle("on",h.startsWith("#/about"));
}
function render(){
  const h=location.hash||"#/";
  setNav(h);
  window.scrollTo(0,0);
  try{
    if(h.startsWith("#/ranking")) $("#view").innerHTML=viewRanking();
    else if(h.startsWith("#/search")) $("#view").innerHTML=viewSearch();
    else if(h.startsWith("#/detail/")) $("#view").innerHTML=viewDetail(decodeURIComponent(h.split("/")[2]));
    else if(h.startsWith("#/signals")) $("#view").innerHTML=viewSignals(h.split("/")[2]);
    else if(h.startsWith("#/blast")) $("#view").innerHTML=viewBlast();
    else if(h.startsWith("#/about")) $("#view").innerHTML=viewAbout();
    else $("#view").innerHTML=viewHome();
  }catch(e){
    $("#view").innerHTML=`<div class="card"><b>表示エラー</b><div class="muted" style="font-size:12px;margin-top:6px">${e.message}</div></div>`;
  }
}

function freshnessText(){
  const lag=DATA.data_lag_days;
  if(lag==null) return "終値ベース";

  return `${lag}日前・終値`;
}
/* 表示モード：auto（幅で自動）／pc（ワイド固定）／mobile（スマホ固定）。localStorageに保存 */
const VIEW_MODES=["auto","pc","mobile"];
const VIEW_LABEL={auto:"🔄 自動",pc:"🖥 PC",mobile:"📱 スマホ"};
function readView(){try{return localStorage.getItem("kabuai_view")||"auto";}catch(e){return "auto";}}
function saveView(m){try{localStorage.setItem("kabuai_view",m);}catch(e){}}
function applyView(){
  const m=readView();
  const wide=(window.innerWidth||1024)>=900;
  const pc=(m==="pc")||(m==="auto"&&wide);
  if(document.body){
    document.body.classList.toggle("pc",pc);
    document.body.classList.toggle("mobile",!pc);
  }
  const el=document.getElementById("viewtoggle");
  if(el)el.textContent=VIEW_LABEL[m]||VIEW_LABEL.auto;
}
function cycleView(){
  const cur=readView();
  saveView(VIEW_MODES[(VIEW_MODES.indexOf(cur)+1)%VIEW_MODES.length]);
  applyView();
}
window.addEventListener("resize",()=>{if(readView()==="auto")applyView();});
applyView();

load().then(()=>{
  $("#datepill").textContent="データ日付 "+(DATA.data_date||"—")+"（"+freshnessText()+"）";
  applyView();
  render();
}).catch(e=>{$("#view").innerHTML=`<div class="card">${e.message}</div>`;});
