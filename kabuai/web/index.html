<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#0e1116">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>モメンタムチンパン — 今日の買い候補</title>
<style>
  /* v2（2026-07-02 いちから作り直し）: 画面は「✅検証済み買い候補＋出口＋先物連動タグ」だけに絞る。
     反発（反転）系シグナルは本人指示で非表示（ロジックはデータ側に残置・BUY_KEYSで制御）。 */
  :root{
    --bg:#0e1116; --card:#171b22; --card2:#1e242d; --line:#2a313c;
    --tx:#e8edf3; --mut:#8a94a3; --acc:#4d96ff;
    --up:#16C784; --dn:#EA3943; --wa:#ff9f43;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);
    font-family:-apple-system,"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif;
    padding-bottom:64px;font-size:14px;line-height:1.55}
  a{color:inherit;text-decoration:none}
  header{position:sticky;top:0;z-index:10;background:rgba(14,17,22,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
  header .app{font-weight:700;font-size:16px}
  header .app small{color:var(--acc);font-weight:700}
  .datepill{font-size:11px;color:var(--mut);background:var(--card2);
    border:1px solid var(--line);border-radius:999px;padding:3px 10px}
  main{max-width:560px;margin:0 auto;padding:16px}
  h2{font-size:15px;margin:20px 2px 10px;display:flex;align-items:center;gap:8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px}
  .muted{color:var(--mut)}
  .pos{color:var(--up)}.neg{color:#ff6b6b}
  .back{font-size:13px;color:var(--acc);font-weight:600;margin-bottom:8px;display:inline-block}
  .disc{margin:18px 2px 4px;font-size:11px;color:var(--mut);line-height:1.6}
  nav{position:fixed;bottom:0;left:0;right:0;background:#11151c;
    border-top:1px solid var(--line);display:flex;height:56px;z-index:20}
  nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;color:var(--mut);font-size:11px}
  nav a.on{color:var(--acc)}
  nav a .i{font-size:18px}
  /* ✅ 今日の買い候補（ホームの主役） */
  .hero{margin:0 0 12px;padding:13px 14px;border-radius:14px;border:1px solid var(--line);background:var(--card)}
  .hero.broad{background:linear-gradient(180deg,rgba(77,171,247,.14),rgba(77,171,247,.04));border-color:rgba(77,171,247,.5)}
  .hero .hh{font-weight:900;font-size:16px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .hero .hh small{font-weight:400;font-size:11px;color:var(--mut)}
  .hero .lead{font-size:13px;line-height:1.65;margin-top:6px}
  .broadline{margin-top:8px;font-size:12px;color:var(--tx);background:rgba(77,171,247,.1);
    border:1px solid rgba(77,171,247,.35);border-radius:9px;padding:7px 10px}
  .picklist{margin-top:10px;border-top:1px solid var(--line)}
  .pickrow{display:flex;align-items:center;gap:10px;padding:10px 2px;border-bottom:1px solid var(--line)}
  .pickrow .pk-nm{flex:1;min-width:0}
  .pickrow .pk-nm b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14px}
  .pickrow .pk-nm small{color:var(--mut);font-size:11px}
  .pickrow .pk-ev{font-weight:800;font-size:13px;text-align:right;white-space:nowrap}
  .pickrow .pk-ev small{display:block;font-weight:600;font-size:10px;color:var(--mut)}
  .chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
  .chip{font-size:10.5px;background:var(--card2);border:1px solid var(--line);
    border-radius:999px;padding:2px 8px;color:var(--tx)}
  .chip.buy{border-color:rgba(22,199,132,.5);background:rgba(22,199,132,.09);color:var(--up);font-weight:700}
  /* 先物連動タグ: 自力=緑（狙い目）/ 中連動=グレー / 高連動=赤（先物依存・注意） */
  .ftag{font-size:10.5px;font-weight:800;border-radius:999px;padding:2px 8px;white-space:nowrap}
  .ftag.self{color:var(--up);border:1px solid rgba(22,199,132,.55);background:rgba(22,199,132,.08)}
  .ftag.mid{color:var(--mut);border:1px solid var(--line);background:var(--card2)}
  .ftag.high{color:var(--dn);border:1px solid rgba(234,57,67,.55);background:rgba(234,57,67,.08)}
  .exitbox{margin-top:10px;font-size:12.5px;background:rgba(22,199,132,.07);
    border:1px solid rgba(22,199,132,.3);border-radius:9px;padding:8px 10px;line-height:1.7}
  .pickfoot{display:flex;flex-wrap:wrap;gap:6px 14px;align-items:center;margin-top:9px}
  .pickfoot .lpt{font-size:11px;color:var(--mut);border:1px solid var(--line);border-radius:999px;padding:2px 9px;cursor:pointer}
  .pickfoot .more{color:var(--acc);font-weight:700;font-size:12px;margin-left:auto}
  /* 検索カード */
  .rcard{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:13px 14px;margin-bottom:10px;display:block}
  .rcard .top{display:flex;align-items:flex-start;gap:10px}
  .rcard .pchip{font-size:12px;color:var(--mut)}
  .metrics{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;font-size:12px}
  .metrics span{color:var(--mut)} .metrics b{color:var(--tx)}
  .nosig{font-size:11px;color:var(--mut);margin-top:8px}
  .planline{display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin-top:9px;padding:7px 10px;
    border-radius:9px;background:rgba(22,199,132,.08);border:1px solid rgba(22,199,132,.35);font-size:12px}
  .planline .pl-ev{font-weight:800;font-size:13px}
  .searchbox{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:12px;
    padding:12px 14px;color:var(--tx);font-size:16px;outline:none;-webkit-appearance:none}
  .searchbox:focus{border-color:var(--acc)}
  .searchbox::placeholder{color:var(--mut)}
  .star{flex:0 0 auto;cursor:pointer;font-size:18px;line-height:1;color:var(--mut);user-select:none;padding:0 2px}
  .star.on{color:#ffd93d}
  .tag{font-size:11px;color:var(--mut);border:1px solid var(--line);border-radius:7px;padding:2px 7px}
  .warn{color:var(--wa)}
  /* 詳細 */
  .ret3{display:flex;gap:8px;margin-top:8px}
  .ret3 .b{flex:1;background:var(--card2);border:1px solid var(--line);
    border-radius:12px;padding:9px 6px;text-align:center}
  .ret3 .b .l{font-size:11px;color:var(--mut)} .ret3 .b .v{font-size:15px;font-weight:700}
  .exitcard{border:1px solid rgba(22,199,132,.45);background:rgba(22,199,132,.07)}
  .hsearch{display:flex;align-items:center;gap:10px;color:var(--mut);font-size:14px}
  .poschip{padding:9px 0;border-bottom:1px solid var(--line)}
  .poschip:last-of-type{border-bottom:none}
  .posdel{font-size:10px;background:none;border:1px solid var(--line);color:var(--mut);
    border-radius:999px;padding:2px 8px;cursor:pointer}
  .posin{background:var(--card2);border:1px solid var(--line);color:var(--tx);
    border-radius:8px;padding:7px 9px;font-size:13px;width:130px}
  .posadd{background:var(--up);color:#0e1116;font-weight:800;border:none;border-radius:8px;
    padding:7px 16px;font-size:13px;cursor:pointer}
  .cardgrid{margin-top:8px}
  @media(min-width:900px){
    main{max-width:1080px}
    .cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
    .cardgrid .rcard{margin-bottom:0;height:100%}
  }
</style>
</head>
<body>
<header>
  <div class="app">🐵 モメンタム<small>チンパン</small></div>
  <a href="#/about" class="datepill" id="datepill">データ日付 —</a>
</header>
<main id="view"><div class="muted">読み込み中…</div></main>
<nav>
  <a href="#/" id="nav-home" class="on"><span class="i">✅</span>今日の買い</a>
  <a href="#/search" id="nav-search"><span class="i">🔍</span>検索</a>
  <a href="#/about" id="nav-about"><span class="i">❓</span>使い方</a>
</nav>

<script>
const fmtPct=v=>(v==null||isNaN(v))?"—":(v>=0?"+":"")+v.toFixed(2)+"%";
const cls=v=>(v==null||isNaN(v))?"muted":(v>=0?"pos":"neg");
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
const $=s=>document.querySelector(s);
let DATA=null;

async function load(){
  const cands=["../data/latest.json","data/latest.json","./data/latest.json"];
  for(const u of cands){
    try{const r=await fetch(u,{cache:"no-store"});if(r.ok){DATA=await r.json();return;}}catch(e){}
  }
  throw new Error("latest.json が見つかりません（build_data.py を実行してください）");
}

// ── 表示する買いシグナル（v2の核心設定） ──
// 反発（反転/強反転）系は本人指示で非表示（2026-07-02「反転とかいらない・わかりずらい」）。
// データ側の検出・実績集計はそのまま動いているので、戻す時はこの配列に
// "strong_reversal","reversal" を足すだけ。
const BUY_KEYS=["strong_accum","accum"];
const TRK_WIN_MIN=52;   // 検証済みエッジのゲート（得意保有の勝率52%以上＆平均プラス）

function sigTrack(k){const t=DATA.signal_track;return (t&&t.available&&t.groups&&t.groups[k])||null;}
function bestHorizon(g,hs){
  let best=null;
  hs.forEach(h=>{const x=g.h&&g.h[String(h)]; if(!x||!x.n) return;
    if(best===null||x.win>best.x.win||(x.win===best.x.win&&x.avg>best.x.avg)) best={h,x};});
  return best;
}
function sigHasEdge(k){
  if(BUY_KEYS.indexOf(k)<0) return false;
  const g=sigTrack(k); if(!g||!g.n) return false;
  const b=bestHorizon(g,(DATA.signal_track.horizons)||[5,10,20]);
  return !!(b&&b.x.win>=TRK_WIN_MIN&&b.x.avg>0);
}
// 期待値(EV)＝出口ルール込み（保有8日・損切り-12%・利を伸ばす）の1件あたり実現平均リターン
function sigEV(k){
  if(!sigHasEdge(k)) return null;
  const g=sigTrack(k);
  const b=bestHorizon(g,(DATA.signal_track.horizons)||[5,10,20]);
  const ex=(g.exit&&g.exit.n)?g.exit:null;
  const m=(DATA.signals&&DATA.signals.groups&&DATA.signals.groups[k])||{};
  return {k,label:m.label||k,emoji:m.emoji||"",exit:ex,
    ev:ex?ex.avg:b.x.avg,win:ex?ex.win:b.x.win,hold:ex?ex.t:b.h,sl:ex?ex.sl:12};
}
function buyStat(r){
  const a=(r.signals||[]).map(sigEV).filter(Boolean);
  if(!a.length) return null;
  a.sort((x,y)=>y.ev-x.ev);
  return a[0];
}
// 代表出口（表示用）: BUY_KEYS のうち出口実績のある最初のもの。無ければ既定 8日/-12%
function exitRep(){
  for(const k of BUY_KEYS){const g=sigTrack(k); if(g&&g.exit&&g.exit.n) return g.exit;}
  return {t:8,sl:12};
}

// ── 先物連動度タグ（correlation.py 由来・自力=狙い目/高連動=先物依存で注意） ──
function ftagRank(r){
  const t=r&&r.futures_tag;
  if(t==="自力")return 0;
  if(t==="中連動")return 1;
  if(t==="高連動")return 3;   // 買い候補でも一段下げる（先物に振られやすい）
  return 2;                   // データ不足/未計測はその間
}
function ftagChip(r){
  const t=r&&r.futures_tag; if(!t) return "";
  const c=t==="自力"?"self":t==="高連動"?"high":"mid";
  const rv=(r.futures_corr!=null&&!isNaN(r.futures_corr))?" r"+Number(r.futures_corr).toFixed(2):"";
  return `<span class="ftag ${c}" title="先物（日経レバ1570）との連動度。自力=自分の需給で動く／高連動=先物に振られやすい">${t}${rv}</span>`;
}

// ── 低位株(¥1000未満)は既定で隠す（従来設定を引き継ぎ） ──
const BUY_PRICE_MIN=1000;
function hideLowPrice(){try{return localStorage.getItem("kabuai_lowprice")!=="0";}catch(e){return true;}}
function toggleLowPrice(){try{localStorage.setItem("kabuai_lowprice",hideLowPrice()?"0":"1");}catch(e){} render();}
function priceOK(r){return !hideLowPrice()||!(r&&r.price>0&&r.price<BUY_PRICE_MIN);}

// ── 今日の買い候補（BUY_KEYSの点灯銘柄を dedup → 自力優先 → 期待値順） ──
function candidates(){
  const s=DATA.signals; if(!s) return {list:[],hidden:0};
  const lit=(s.order||[]).filter(k=>BUY_KEYS.indexOf(k)>=0&&s.groups[k]&&s.groups[k].count>0&&sigHasEdge(k));
  const seen={},all=[];
  lit.forEach(k=>(s.groups[k].members||[]).forEach(r=>{
    if(seen[r.code])return; seen[r.code]=1;
    all.push({...r,signals:(r.signals||[]).filter(x=>BUY_KEYS.indexOf(x)>=0&&sigHasEdge(x))});
  }));
  const list=all.filter(priceOK), hidden=all.length-list.length;
  // ソート優先度: ①自力（先物に振られにくい）→ ②期待値の高い順 → ③RSI低い順
  list.sort((a,b)=>(ftagRank(a)-ftagRank(b))
    ||(((buyStat(b)||{ev:-1e9}).ev)-((buyStat(a)||{ev:-1e9}).ev))
    ||((a.rsi!=null?a.rsi:50)-(b.rsi!=null?b.rsi:50)));
  return {list,hidden};
}
function isCand(r){return (r.signals||[]).some(sigHasEdge);}

function pctTag(r1){if(r1==null||isNaN(r1))return "";
  const c=r1>0?"var(--up)":r1<0?"#ff6b6b":"var(--mut)",s=r1>0?"+":"";
  return `<span style="color:${c};font-weight:700">${s}${r1.toFixed(1)}%</span>`;}
function sigChips(r){
  const edge=(r.signals||[]).filter(sigHasEdge);
  if(!edge.length) return "";
  return `<div class="chips">`+edge.map(k=>{
    const e=sigEV(k); if(!e) return "";
    return `<span class="chip buy">✅ ${e.emoji}${e.label}<span class="muted" style="font-weight:400"> 勝率${e.win}%</span></span>`;
  }).join("")+ftagChip(r)+`</div>`;
}
// 買い候補カードの期待値・出口ライン
function planLine(r){
  const st=buyStat(r); if(!st) return "";
  return `<div class="planline">
    <span class="pl-ev ${st.ev>=0?"pos":"neg"}">期待値 ${st.ev>=0?"+":""}${st.ev}%<small class="muted">/件</small></span>
    <span>勝率${st.win}% ・ 保有${st.hold}日めど ・ 損切り-${st.sl}%</span></div>`;
}

// ── ⭐ ウォッチ（☆保存。localStorage 従来キーを引き継ぎ） ──
let WATCH=readWatch();
function readWatch(){try{return JSON.parse(localStorage.getItem("kabuai_watch")||"[]")||[];}catch(e){return [];}}
function saveWatch(){try{localStorage.setItem("kabuai_watch",JSON.stringify(WATCH));}catch(e){}}
function isWatched(code){return WATCH.indexOf(code)>=0;}
function toggleWatch(code){const i=WATCH.indexOf(code);if(i>=0)WATCH.splice(i,1);else WATCH.unshift(code);saveWatch();return isWatched(code);}
function star(code){const on=isWatched(code);
  return `<span class="star${on?" on":""}" data-star="${code}" onclick="onStar(event,'${code}')">${on?"★":"☆"}</span>`;}
function onStar(ev,code){ev.preventDefault();ev.stopPropagation();const on=toggleWatch(code);
  if(document.querySelectorAll)document.querySelectorAll('[data-star="'+code+'"]').forEach(b=>{b.className="star"+(on?" on":"");b.textContent=on?"★":"☆";});}
function watchSummaryInner(){
  const found=WATCH.map(c=>SEARCH&&SEARCH.find(s=>s.code===c)).filter(Boolean);
  if(!found.length) return `<span class="muted">⭐ ウォッチ ${WATCH.length}件（本日のデータ対象外）</span>`;
  const chips=found.map(r=>`<a class="chip${isCand(r)?" buy":""}" href="#/detail/${r.code}">${esc(r.name)} ${isCand(r)?"✅":""}${pctTag(r.r1)?" "+pctTag(r.r1):""}</a>`).join("");
  const n=found.filter(isCand).length;
  return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><b>⭐ ウォッチ ${found.length}件</b>
    <a style="margin-left:auto;color:var(--acc);font-weight:600;font-size:12px" href="#/search">一覧 →</a></div>
    <div class="muted" style="font-size:12px;margin-bottom:6px">${n?`<b class="pos">${n}件が本日の買い候補</b>`:"本日の買い候補はありません"}</div>
    <div class="chips">${chips}</div>`;
}

// ── 📒 持ち株コーチ（端末内保存・買った後の出口規律を毎日指示） ──
// 出口は検証済みの1本に統一: 保有8日めど・損切り-12%・利確なし（利を伸ばす）。
const PLAN={hold:8,sl:12};
function loadPos(){try{return JSON.parse(localStorage.getItem("kabuai_pos")||"[]");}catch(e){return [];}}
function savePos(a){try{localStorage.setItem("kabuai_pos",JSON.stringify(a));}catch(e){}}
function addPosFromForm(code,name){
  const pr=parseFloat((document.getElementById("pos-price")||{}).value);
  const dt=(document.getElementById("pos-date")||{}).value;
  if(!(pr>0)||!dt)return;
  const a=loadPos(); a.push({code,name,entry:pr,date:dt}); savePos(a); render();
}
function delPos(i){const a=loadPos(); a.splice(i,1); savePos(a); render();}
function bizDays(from,to){ // 営業日カウント(土日除外・祝日未考慮)・買った日=1日目
  let d=new Date(from+"T00:00:00"),e=new Date(to+"T00:00:00"),n=0;
  if(isNaN(d)||isNaN(e)||d>e)return 0;
  while(d<=e&&n<=60){const w=d.getDay(); if(w!==0&&w!==6)n++; d.setDate(d.getDate()+1);}
  return n;
}
function bizAdd(from,n){ // fromを1日目としてn営業日目の日付(M/D)
  let d=new Date(from+"T00:00:00"),c=0;
  if(isNaN(d))return "—";
  for(let i=0;i<60;i++){const w=d.getDay(); if(w!==0&&w!==6){c++; if(c>=n)break;} d.setDate(d.getDate()+1);}
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function posCoach(){
  const a=loadPos(); if(!a.length)return "";
  const ref=DATA.data_date||"";
  const now=new Date();
  const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
  const items=a.map((p,i)=>{
    const row=(DATA.ranking||[]).find(r=>r.code===p.code)||(SEARCH&&SEARCH.find(r=>r.code===p.code))||null;
    const cur=row?row.price:null;
    const pnl=(cur!=null&&p.entry>0)?(cur/p.entry-1)*100:null;
    const slP=Math.round(p.entry*(1-PLAN.sl/100));
    const day=bizDays(p.date,todayStr);
    let act,actCls="";
    if(cur!=null&&cur<=slP){act=`🔴 損切りライン（¥${slP.toLocaleString()}）割れ — <b>今日売って仕切り直し</b>`;actCls="neg";}
    else if(day>=PLAN.hold){act=`⏰ ${PLAN.hold}営業日目 — <b>今日の大引けで手仕舞い</b>（保有しすぎない）`;}
    else{act=`🟢 ホールド（${day}日目／${PLAN.hold}日・手仕舞いめど ${bizAdd(p.date,PLAN.hold)}）・損切り ¥${slP.toLocaleString()}・利確なし（引っ張る）`;}
    return `<div class="poschip">
      <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
        <a href="#/detail/${p.code}" style="font-weight:800">${esc(p.name||p.code)}</a>
        <span class="muted" style="font-size:11px">${p.code}・${p.date}に¥${(+p.entry).toLocaleString()}</span>
        <span style="margin-left:auto;font-weight:800" class="${pnl!=null?cls(pnl):""}">${pnl!=null?fmtPct(pnl):"—"}</span>
        <button class="posdel" onclick="event.preventDefault();delPos(${i})">売った/削除</button></div>
      <div class="${actCls}" style="font-size:12.5px;margin-top:4px">${act}</div></div>`;
  }).join("");

function drawCandle(ch){
  const cv=document.getElementById("candle");if(!cv||!ch||!ch.c||!ch.c.length)return;
  const dpr=window.devicePixelRatio||1, W=cv.clientWidth||cv.parentElement.clientWidth-28, H=240;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.height=H+"px";
  const g=cv.getContext("2d"); g.scale(dpr,dpr); g.clearRect(0,0,W,H);
  const padL=8,padR=50,padT=10,padB=22, cw=W-padL-padR, chh=H-padT-padB;
  const o=ch.o,h=ch.h,l=ch.l,c=ch.c,n=c.length;
  let pmin=Math.min(...l),pmax=Math.max(...h); if(pmin===pmax){pmin*=0.99;pmax*=1.01;}
  const pad=(pmax-pmin)*0.08; pmin-=pad; pmax+=pad;
  const xOf=i=> padL+(n<=1?cw/2:i*cw/(n-1)), band=cw/n;
  const yP=v=> padT+(pmax-v)/(pmax-pmin)*chh;
  g.font="10px sans-serif";
  g.strokeStyle="#2a313c"; g.lineWidth=1; g.fillStyle="#8a94a3";
  [pmin,(pmin+pmax)/2,pmax].forEach(v=>{const y=yP(v);
    g.beginPath();g.moveTo(padL,y);g.lineTo(W-padR,y);g.stroke();
    g.textAlign="left"; g.fillText("¥"+Math.round(v),W-padR+4,y+3);});
  const bw=Math.max(2,Math.min(9,band*0.6));
  for(let i=0;i<n;i++){const x=xOf(i),up=c[i]>=o[i];
    g.strokeStyle=up?"#16C784":"#EA3943"; g.fillStyle=up?"#16C784":"#EA3943";
    g.beginPath();g.moveTo(x,yP(h[i]));g.lineTo(x,yP(l[i]));g.stroke();
    const yo=yP(o[i]),yc=yP(c[i]); g.fillRect(x-bw/2,Math.min(yo,yc),bw,Math.max(1,Math.abs(yc-yo)));}
  g.fillStyle="#8a94a3"; g.textAlign="center";
  [0,Math.floor(n/2),n-1].forEach(i=>{g.fillText((ch.dates[i]||"").slice(5),xOf(i),H-6);});
}

function searchResults(q){
  if(!SEARCH)return `<div class="card muted">索引を読み込み中…</div>`;
  q=(q||"").trim();
  if(!q){
    const prompt=`<div class="card muted" style="margin-top:10px">コード（例 7203）か銘柄名の一部を入力すると、`
      +`監視中の <b style="color:var(--tx)">${SEARCH.length.toLocaleString()}</b> 銘柄から、`
      +`その銘柄が<b style="color:var(--tx)">✅買い候補かどうか</b>を確認できます。</div>`;
    const found=[],missing=[];
    WATCH.forEach(c=>{const r=SEARCH.find(s=>s.code===c);r?found.push(r):missing.push(c);});
    if(!found.length&&!missing.length)
      return `<div class="card muted">⭐ カードの☆を押すと気になる銘柄をここに保存できます。</div>`+prompt;
    found.sort((a,b)=>(isCand(b)?1:0)-(isCand(a)?1:0));
    const miss=missing.length?`<div class="muted" style="font-size:11px;margin:8px 2px">${missing.map(esc).join("・")} は本日は対象外</div>`:"";
    return `<div style="font-weight:700;margin:0 2px 7px;color:var(--up)">⭐ ウォッチ中（${found.length+missing.length}件）</div>`
      +`<div class="cardgrid">${found.map(searchCard).join("")}</div>${miss}${prompt}`;
  }
  const ql=q.toLowerCase();
  let hits=SEARCH.filter(r=>r.code.startsWith(q)||r.name.toLowerCase().includes(ql));
  const score=r=>(r.code===q?1000:r.code.startsWith(q)?500:0)+(isCand(r)?100:0);
  hits.sort((a,b)=>score(b)-score(a));
  const shown=hits.slice(0,60);
  if(!shown.length)return `<div class="card muted">「${esc(q)}」に一致する銘柄はありません。`
    +`<br><span style="font-size:11px">※上場後まもない等で履歴が足りない銘柄は出ないことがあります。</span></div>`;
  const more=hits.length>shown.length?`<div class="muted" style="font-size:11px;margin:2px 2px 8px">上位${shown.length}件を表示（${hits.length}件一致・絞り込んでください）</div>`:
    `<div class="muted" style="font-size:11px;margin:2px 2px 8px">${shown.length}件一致</div>`;
  return more+`<div class="cardgrid">${shown.map(searchCard).join("")}</div>`;
}

      <li><b style="color:var(--up)">自力</b>（r ${f.th_mid!=null?f.th_mid:0.40} 未満）… 自分の需給で動く。押し目→反発の「型」が出やすい<b style="color:var(--tx)">狙い目</b>。買い候補の並びで最上位。</li>
      <li><b style="color:var(--tx)">中連動</b>（r ${f.th_mid!=null?f.th_mid:0.40}〜）… 中間。</li>
      <li><b style="color:var(--dn)">高連動</b>（r ${f.th_high!=null?f.th_high:0.70} 以上）… 指数寄与の大きい値嵩株など。先物のアービトラージで<b style="color:var(--tx)">機械的に振られ、型が壊れやすい</b>ので注意（並びも一段下げます）。</li>
      <li>直近の共通5分足 ${f.window!=null?f.window:48}本（約4時間分）で計算。<b style="color:var(--tx)">朝の表示は前営業日のザラ場ベース</b>、夕方更新後は当日ベース。足が足りない銘柄はタグ非表示。</li>
      <li>β（変動の大きさ）ではなく「方向がどれだけ一緒に動くか」だけを見ています。しきい値は運用しながら調整します。</li>
    </ul>
  </div>

  <h2>アプリとして使う</h2>
  <div class="card">
    <p class="muted" style="margin:0;font-size:12px;line-height:1.8">
      📱 スマホの<b style="color:var(--tx)">「ホーム画面に追加」</b>でアプリのように使えます
      （iPhone: 共有→ホーム画面に追加 ／ Android: メニュー→アプリをインストール）。</p>
  </div>

  <h2>データについて</h2>
  <div class="card">
    <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
      <span class="tag">データ日付 ${DATA.data_date||"—"}</span>
      <span class="tag">${freshnessText()}</span>
      <span class="tag">更新 平日 朝7時・8:40・夕18:30ごろ</span>
      <span class="tag">対象 ${DATA.universe_scored?DATA.universe_scored.toLocaleString():"—"}銘柄</span>
    </div>
    <p class="muted" style="margin-top:10px;font-size:12px;line-height:1.7">
      表示は<b style="color:var(--tx)">最新営業日の終値（EOD）ベース</b>です。リアルタイムではなく、<b style="color:var(--tx)">場中（9〜15時）は数字が変わりません</b>。
      原データは <b style="color:var(--tx)">J-Quants（JPX）</b> の日足を加工・計算したものです。
      先物連動タグのみ、Yahoo!ファイナンス由来の遅延5分足（yfinance）から計算した参考値です。</p>
  </div>

  <h2>免責・ライセンス</h2>
  <div class="card">
    <ul style="margin:0;padding-left:18px;font-size:12px;line-height:1.8;color:var(--mut)">
      <li>本アプリは<b style="color:var(--tx)">参考情報</b>であり、特定銘柄の売買を推奨するものではありません。<b style="color:var(--tx)">投資判断は利用者ご自身の責任</b>で行ってください。</li>
      <li>シグナル・期待値・タグはルール／AIによる<b style="color:var(--tx)">推定値で、将来の値動きや精度を保証しません</b>。</li>
      <li>生の株価（OHLCV）は<b style="color:var(--tx)">再配布していません</b>。出力は計算済みの指標と、表示用に窓を限定した加工チャートのみです。</li>
      <li>商用での一般公開にあたっては、<b style="color:var(--tx)">J-Quants の利用条件を JPX に確認</b>のうえ運用してください。</li>
    </ul>
  </div>
  <p class="disc">${DATA.disclaimer}<br>生成: ${DATA.generated_at||"—"} / source: ${DATA.source||"—"}</p>`;
}

// ── ルーター ──
function setNav(h){
  $("#nav-home").classList.toggle("on",h==="#/"||h.startsWith("#/detail"));
  $("#nav-search").classList.toggle("on",h.startsWith("#/search"));
  $("#nav-about").classList.toggle("on",h.startsWith("#/about"));
}
function render(){
  const h=location.hash||"#/";
  setNav(h);
  window.scrollTo(0,0);
  try{
    if(h.startsWith("#/search")) $("#view").innerHTML=viewSearch();
    else if(h.startsWith("#/detail/")) $("#view").innerHTML=viewDetail(decodeURIComponent(h.split("/")[2]));
    else if(h.startsWith("#/about")) $("#view").innerHTML=viewAbout();
    else $("#view").innerHTML=viewHome();
  }catch(e){
    $("#view").innerHTML=`<div class="card"><b>表示エラー</b><div class="muted" style="font-size:12px;margin-top:6px">${esc(e.message)}</div></div>`;
  }
}
window.addEventListener("hashchange",render);
// PWA: ホーム画面に追加できるようにする（SWはキャッシュなし＝常に最新データ）
try{if(typeof navigator!=="undefined"&&navigator.serviceWorker)navigator.serviceWorker.register("sw.js");}catch(e){}
function freshnessText(){
  const lag=DATA.data_lag_days;
  if(lag==null) return "終値ベース";
  if(lag<=0) return "当日・終値";
  if(lag===1) return "前営業日・終値";
  return `${lag}日前・終値`;
}
load().then(()=>{
  $("#datepill").textContent="データ日付 "+(DATA.data_date||"—")+"（"+freshnessText()+"）";
  render();
}).catch(e=>{$("#view").innerHTML=`<div class="card">${esc(e.message)}</div>`;});
</script>
</body>
</html>
